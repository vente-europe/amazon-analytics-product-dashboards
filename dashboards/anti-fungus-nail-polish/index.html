 sehr gut gelaufen.👍", "tags": []}, {"r": 4, "t": "Seit einem Monat verwende ich das Produkt. Ich kann bestätigen, dass die Nagel gesund werden aber sehr langsam. Wichtig ist dass es funktioniert. Ich ziehe ein Stern, weil die Flasche extrem klein ist und reicht nicht für eine gesamt Behandlung.", "tags": []}, {"r": 4, "t": "Gutes Produkt, aber zu teuer. Wirkstoff hat mir am Anfang geholfen, später hatte ich den Eindruck das der Nagel nicht besser wurde. Bin auf Essig Essenz umgestiegen und bin sehr zufrieden. Jede Podologin gibt mir recht.", "tags": []}, {"r": 4, "t": "Das funktioniert aber es ist zimlich teuer und ist wyrklich sehr kleine flasche.", "tags": []}, {"r": 4, "t": "Produkt erfüllt seine Zusagen zur vollsten Zufriedenheit. Die Anwendung ist verständlich und ohne Schwierigkeiten zu erledigen. Sehr zu empfehlen und zu gebrauchen.", "tags": []}, {"r": 4, "t": "Hat wie versprochen geholfen", "tags": []}, {"r": 4, "t": "Bis jetzt habe ich volles Vertrauen darin", "tags": []}, {"r": 4, "t": "verbraucht.", "tags": []}, {"r": 4, "t": "Habe es benutzt und es hat auch geholfen, allerdings nur bedingt so das ich das Produkt nach meinen Erfahrungen nicht weiterempfehlen würde One person found this helpful", "tags": []}, {"r": 4, "t": "Kam pünktlich. Man muss Geduld haben und man sieht erst nach wochen Erfolg aber es wirkt super.nur nicht zu früh absetzten.", "tags": []}, {"r": 4, "t": "effektiv, aber zu teuer für eine Studentin", "tags": []}, {"r": 4, "t": "Ich bin begeistert vom Produkt. Der Preis ist zwar nicht der Hit deshalb 4 Sterne aber mein Hausarzt/Internist hat mir das Produkt empfohlen, da Tabletten zum Einnehmen zu sehr auf die Leber gehen würden. Ich muss sagen obwohl es bei meinem grossen Zeh 1/4 vom Pilz betroffen war und ich erst regelmäßig und dann ab und zu nur noch den Lack aufgetragen habe ist er einwandfrei nachgewachsen. Kann ich nach dem letzten Sommer dieses Jahr wieder Schöne Füße zeigen.:) Top!", "tags": []}, {"r": 4, "t": "nun was soll ich groß schreiben,kenne dieses produkt noch nicht und teste es zum 1 ten mal\\...bis jetzt schaut es aber gut aus\\...hoffe das es seine wirkung nicht verfehlt.", "tags": []}, {"r": 5, "t": "Ich bin zufrieden von Ciclopoli! Nachdem ich lange mit Nagelpilz zu kämpfen hatte, habe ich dieses Produkt ausprobiert und bin sehr zufrieden mit den Ergebnissen. Es lässt sich leicht auftragen und wirkt schnell gegen die Pilzinfektion. Nach einigen Wochen Anwendung sind meine Nägel deutlich gesünder und weniger verfärbt. Wunder dürfen nicht erwartet werden, denn es braucht Geduld und natürlich Ausdauer! Ich kann Ciclopoli jedem empfehlen, der nach einer effektiven Lösung gegen Nagelpilz sucht. Es hat mir wirklich geholfen und ich bin sehr dankbar dafür!", "tags": []}, {"r": 5, "t": "Durch meine Neurodermitis am Fuß bin ich anfälliger für Pilzinfektionen und habe mich im Schwimmbad mit Fußpilz und Nagelpilz infiziert trotz Badelatschen, was ich gar nicht prickelnd finde. Mein Hautarzt verordnete mir eine Therapie mit TerbiGalen, was alle Pilze innerlich und äußerlich bekämpfen soll inklusive den Nagel-&Fußpilz. Für die Äußere Behandlung des Fußpilzes riet er mir paralell Terbiderm Spray zu verwenden. Aber was für meinen Nagelpilz zur äußeren Anwendung??? Also fragte ich eine Bekannte mit Diabetis die öfter mal mit Nagelpilz zu tun hat aufgrund ihrer Erkrankung und sie empfahl mir Ciclopoli . Also in der Apotheke die erste Flasche gekauft und danach weiterrecherchiert. Die 2. Flasche bei Amazon bestellt und siehe da, nach kurzer Zeit und genauer Einhaltung der Anwendungsempfehlung sieht man die ersten Erfolge und es wird Stück für Stück besser. Bei der Kontrolle des Arztes nach 7 Wochen (Apothekenkauf) war es sichtbar besser. Jetzt mit der 2. Flasche (Amazonkauf) dabei und in nächster Zeit öfter zur ärztlichen Kontrolle dann wird es definitiv noch besser sein\\... Ich bin dank Ciclopoli als Begleitbehandlung auf einem sehr guten Weg diesen schäbigen Pilz loszuwerden. Der Nagel wächst langsam gesund nach und ist klar. Freue mich wieder auf den Tag an dem ich meine Fußnägel wieder zeigen kann auch wenn es langwierig ist, aber ich sehe die Fortschritte und das macht glücklich. Ciclopoli wurde von uns schon mehrfach weiterempfohlen und auch andere sind super zufrieden. Immer gerne wieder.", "tags": []}, {"r": 5, "t": "Benutzte die Lösung gegen Nagelpilz schon seit Jahren. Grundsätzlich funktioniert das Produkt einwandfrei. Leider kommt der Nagelpilz immer wieder, wenn die Pilzsporen aus den Socken nicht restlos entfernt werden beim reinigen. Dazu sollte ein Hygienereiniger und Waschen bei 90° eigentlich helfen. Leider ist bei mir der Erfolg bisher ausgeblieben. Allerdings kann die Tinktur nichts dafür, dass der Nagelpilz wieder zurück kommen.", "tags": []}, {"r": 5, "t": "Super schnelle Versand der Verkäufer scheint Kompetent und sehr genau zu sein, 24 Stunden Lieferung ab Betsellung und ist auch so gewesen! Ich muss nun was über den Nagelpilz Lack schreiben. Zu erst der wurde mir von meine Hautarztin empfohlen weil ich auch eine Therapie mit Tabletten(Schreibpflichtige) gemacht habe, um den Pilz richtig zu Töten muss man diese Nagellack aufgetragen werden solange der Nagel halb richtig gewachsen ist\\...\\... der Nagellack kann auf den Infezierte Nagel Erfolgreich sein wenn der Nagel nicht eine fortgeschrittene Pilzbefall hat, mann soll nicht denken das der richtig hilft, ich empfehle zum Hautarzt zu gehen und Tabletten beschreiben zu lassen, nur\\.... die sind sehr stark und können den Leber angreifen, muss auch noch dazu mit Blutentnahmen passieren vor und nach der Therapie, die Tabletten Töten den Pilz effektiv von innen und landen in die Blutbahnen.Daher ist besser wenn auch noch dazu diese Nagellack kauft.Der Nagellack ist hier auch noch Preiswerter als in der Apoteke.", "tags": []}, {"r": 5, "t": "Ich bin 21 Jahre alt und mit 10 Jahren war mein Zehennagel eingewachsen. Er wurde gezogen und ich infizierte mich mit Nagelpilz. Mein Nagel war dann sehr dick, gelb und krümelig. Davon habe ich leider keine Bilder mehr, weil ich mich als junge Frau dafür sehr geschämt habe. Ich testete viele Produkte, habe alle gängigen Mittel gegen Nagelpilz durch. Geholfen hat mir Ciclopoli dann am besten. Der Lack ist schnell aufgetragen und zieht gut ein. Da es ein Lack ist, dringt er auch in den Nagelpfalz ein. Die Nagelpfalze waren bei mir die ganzen Jahre immer wieder die Rückzugsorte des Pilzes. Ich dachte, der Pilz wäre weg, daweile lebte er weiter. Ciclopoli erwischte den Pilz also auch am Nagelrand. Weiterhin ist die sogenannte Nageltoilette ganz wichtig. Einmal im Monat habe ich mich hingesetzt und mit Instrumenten die Nagelpfalze gereinigt und bearbeitet und danach mit einer Schleife den Nagel abgeschliffen, damit er dünner wird und der Lack besser einziehen kann. Danach alles desinfizieren! Wichtig ist auch, die Socken bei 60 Grad zu waschen und auch mal die Schuhe zu desinfizieren. Dafür gibt es extra Sprays. Im Sommer viel barfuß laufen, damit keine schwitzige feuchte Atmosphäre im Schuh entsteht, denn das lieben Pilze. Habt Geduld und bleibt dann, dann wird das schon. Bei mir hat es 10 Jahre gedauert, aber jetzt bin ich ihn los. Tschüss Pilz!", "tags": []}, {"r": 5, "t": "Ich habe Ciclopoli im Frühstadium der Nagelpilzerkrankung zur Anwendung gebracht. Etwa 30% der Nagelfläche an beiden großen Zehen waren betroffen. Der Nagel war hell verfärbt (nicht gelblich-verhornt wie im späteren Stadium). Nunmehr, nach vierwöchiger Anwendung, hat sich die betroffene Fläche bereits um die Hälfte verringert. Der vom Pilz befallene Teil des Nagels wächst - mit dem normalen Nagelwachstum - heraus und verkleinert sich beim Schneiden des Nagels. Der Inhalt des kleinen Fläschchens ist jetzt etwa zu 2/3 aufgebraucht. Ich habe den gesamten Nagel an jedem Abend \\\"lackiert\\\" und die Flüssigkeit sicherheitshalber zweimal aufgetragen. Irgendwelche Nebenwirkungen habe ich nicht feststellen können. Nachtrag: Die betroffene Fläche hat sich nochmals um die Hälfte verringert. Ich habe in den letzten zwei Wochen die Flüssigkeit nur noch an jedem zweiten Tag aufgetragen. Im Fläschchen befindet sich jetzt noch ein kleiner Rest.", "tags": []}, {"r": 5, "t": "Ich neige sonst eher dazu eine Rezension zu verfassen um vor abschreckenden Produkten zu warnen. Aber dieser Nagelpilz-Lack hat endlich geholfen. Keine Angst - Bilder vom Befall sind nicht dabei. Lange Zeit hatte ich zunächst an einem Zehnagel Nagelpilz. Ich probierte andere Produkte namenhafter Hersteller aus der Apotheke. Der Aufwand bei diesen Produkten war sehr hoch, mit Reinigung, Pinseln und Abschraben. Leider ohne Erfolg. Teuer waren diese Produkte auch. Als der andere Zeh dann auch noch betroffen war, fand ich dieses Produkt. Täglich einen Anstrich Lack auf den gesamten Nagel und nach ein paar Wochen je nach Stärke des Befalls ist die Sache vergessen. Nur der Nagel wirkt ein wenig dunkler und wächst dann gesund und heller Stück für Stück nach. Nur zu empfehlen. One person found this helpful", "tags": []}, {"r": 5, "t": "Mega! Ich benutze dieses Mittel seid 2 Monaten täglich, und man sieht schon eine Verbesserung. Natürlich dauert das etwas steht aber auch so auf der Beschreibung. 1 mal täglich anwenden. 30 sekunden warten Trocken. Einfach super \\... kann ich sehr empfehlen.", "tags": []}, {"r": 5, "t": "Ich litt vor Jahren an einem Nagelpilz, kein Mittel half. Meine Hautärztin empfahl mir den Ciclopoli Nagellack - und der Nagelpilz war weg. Nun hatte ich wieder einen leichten Pilz entdeckt, mit Ciclopoli hab ich ihn seit ein paar Wochen behandelt und er ist so gut wie rausgewachsen. Wichtig: KEINEN anderen Nagellack auf den erkrankten Nagel machen, der Lack verschließt den Nagel luftdicht und der Pilz kann sich ausbreiten. Besser ausschließlich mit Ciclopoli behandeln und auch danach eine Weile auf Nagellack verzichten, falls sich noch ein paar Spuren im Nagel befinden. Deshalb behandle ich immer etwas länger, dafür ist der Pilz danach auch weg.", "tags": []}, {"r": 5, "t": "Das ist gute! Ich bin sehr zufrieden! One person found this helpful", "tags": []}, {"r": 5, "t": "Hilfreich und sofort Wirkung", "tags": []}, {"r": 5, "t": "It works One person found this helpful", "tags": []}, {"r": 5, "t": "Nach Batrafen, das nicht funktioniert hat 8nur anfänglich ein bisschen) bin ich mit Cilopoli den Nagelpilz jetzt los und das ist prima\\... genauso soll es sein!", "tags": []}, {"r": 5, "t": "Kann ich nur empfehlen... bestes Produkt gegen Nagelpilz", "tags": []}, {"r": 5, "t": "Ich habe an einem Zehennagel Nagelpilz. Nach 3 Monaten regelmäßiger Anwendung ist zu sehen, dass sich der Pilz zurückbildet.", "tags": []}, {"r": 5, "t": "Sehr gut, ist nicht billig", "tags": []}, {"r": 5, "t": "überteuert Reviewed in Germany on 22 February 2025 Afür 6.6 ml fast 60€ ist viel zu teuer\\...", "tags": []}, {"r": 5, "t": "Habe das Ciclopoli hier gekauft und es scheint bis jetzt sehr gut zu wirken. Bei mir sind 4 Zehennägel mit dem Nagelpilz befallen. Ich trage es nun seit 2,5 Wochen jeden Abend nach dem Füßewaschen vor dem Schlafen gehen auf sämtliche Zehennägel und Umgebung auf. Bereits nach 2 Wochen nach dem Beginn des Auftragens ist die ganze gelbliche Verfärbung der Nägel fast nicht mehr zu sehen und die spröden Verformungen kann ich auch sehr bald nun wegschneiden. Ich werde aber nun trotzdem den Nagellack (jetzt aber nur alle 2 Tage) auf die Zehnnägel auftragen, da ich nicht so naiv bin zu glauben, der Nagelpilz wäre nun völlig weg. Bin sehr zufrieden mit dem Nagellack und hätte gedacht nicht gedacht, dass es so gut und so schnell wirken würde.", "tags": []}, {"r": 5, "t": "Alles Bestens!! One person found this helpful", "tags": []}, {"r": 5, "t": "Bin sehr zufrieden Seid einem Monat bin ich dabei Man sieht bereits das der gesunde Nagel nachwächst", "tags": []}, {"r": 5, "t": "Gut zieht schnell ein, kein unbedingtes Kratzen mehr. Nur zu empfehlen. Guter Kauf", "tags": []}, {"r": 5, "t": "Es wirkt sich nach 14 T ss man wirklich sehr geduldig sein.", "tags": []}, {"r": 5, "t": "Shop Apotheke günstiger\\...Wirkung nach 4 Wochen täglicher Anwendung gut erkennbar", "tags": []}, {"r": 5, "t": "Dies ist bereits die zweite Bestellung weil beider Behandlung der Finger der rechten Hand wesentliche Erfolge eigestellt haben. Nach diesem Resultat will ich nun die Zehennägel behandeln. Insgesamt muß ich jedoch vor allzu großen Erwartungen warnen weil die Heilung gaaaanz langsam vorangeht. Dennoch durchaus empfehlenswert!", "tags": []}, {"r": 5, "t": "Kann man noch ma auftragen\\...", "tags": []}, {"r": 5, "t": "👍", "tags": []}, {"r": 5, "t": "Sehr gut", "tags": []}, {"r": 5, "t": "Perfekt, original, gute Qualität schnelle Zusendung!", "tags": []}, {"r": 5, "t": "Etwas teueres produkt wie alle anti pilzmittel. Aber wie anschein macht wirkt es. Werd abwarten und rezension bearbeiten", "tags": []}, {"r": 5, "t": "Gutes Produkt\\...\\...\\...\\...\\...\\...\\...\\...", "tags": []}, {"r": 5, "t": "gern wieder", "tags": []}, {"r": 5, "t": "Hatte an meinem grossen Zehnagel eine kleine \\\"verdächtige\\\" Stelle. Diesen Nagellack gekauft und ihn mittlerweile ein paar Wochen wie in der Packungsbeilage beschrieben benutzt (immernoch das erste Fläschchen). Der Zehennagel sieht fast wieder komplett normal aus. Zugegeben die Stelle war auch noch nicht sehr gross aber ich bin wirklich begeistert!", "tags": []}, {"r": 5, "t": "Bin bis jetzt begeistert. Verwende den Lack jetzt seit 4 Wochen und es ist eine deutliche Verbesserung zu erkennen.", "tags": []}, {"r": 5, "t": "Hallo, nehme es jetzt seit ein paar Wochen und habe das Gefühl, dass es schon hilft. Wenn ein halbes Jahr rum ist, kann man mehr sagen. Einfache Handhabung und dass war mir wichtig.LG", "tags": []}, {"r": 1, "t": "An alle Leidensgenossen, ich benutze dieses Mittel nun seit 5 Monaten. Insegesamt habe ich fast 5 Flaschen verbraucht. Ich habe es morgens und abends auf die entsprechenden Stellen aufgetragen. Es hat bisher keinerlei Verbess rtungen hier, zum Erwerb von \\\"Ciclopoli\\\" 6,6 ml. Mir fiel der Nagel des großen Zeh komplett ab. Darunter befand sich ein neuer Nagel, der normal - also gesund schien. Um allen Eventualitäten vorzubeugen, lackierte ich, vier Wochen lang 2x täglich, den gesunden Nagel. Trotzdem bildete sich der Nagelpilz neu! Für ein Mittel, welches vor Nagelpilz schützen -diesen primär beseitigen soll, bieten sich keine optimalere Voraussetzungen, seine Wirksamkeit unter Beweis zu stellen! Ich kann nur schreiben, das \\\"Ciclopoli\\\" zu meiner großen Enttäuschung nichts bewirkte. Gerne hätte ich hier das Gegenteil berichtet\\... Fünf Zitronen statt einen Sterne!", "tags": []}, {"r": 1, "t": "Völlig wirkungslos, mehr ist dazu nicht zu sagen.", "tags": []}, {"r": 1, "t": "Ich kann die positiven Bewertungen nicht verstehen. Mein Hautarzt verschieb mir Ciclopoli. Ich habe dieses insgesamt bei Amazon 8 Mal gekauft und mehrmals in der Apotheke. Es wurde über 2 Jahre konsequent angewendet. Leider ohne die geringste Wirkung. Der Nagelpils ist in dieser Zeit eher schlimmer geworden. Viel Geld für nichts ausgegeben. Die Kritik geht auch an den Hautarzt, der so etwas verschreibt.", "tags": []}, {"r": 1, "t": "Ist rausgeschmissenes Geld hab die Flasche leer gemacht und ist wie am ersten Tag", "tags": []}, {"r": 1, "t": "26\\. Sept. 2020: nun kann ich nur noch eine Srern vergeben. Nagelpilz ist noch vorhanden. siehe Bild Sept. 2020. Versuche nun ein anderes Mittel, einmal die Woche Auftragen, dass es mittlerweile für EUR 28,- gibt. Erster Auftrag am 27.01.2018. Dann täglich Abends. Flasche leer 30.01.19, also nach einem Jahr Anwendung. Nach fast zwei Jahr der Behandlung sehe ich einen Erfolg. Keine weiter Chemie angewendet. Man muss Geduld haben. Okt. 2019 schiebt sich der gesunde Nagel nach vorne. Nagepilz ist verschwunden. Siehe Bilder 2018 vs. 2019 und Okt. 2019. Da gibt es bestimmt bessere Mittel. 3 Sterne weil es geholfen hat, aber so lange dauert.", "tags": []}, {"r": 1, "t": "Viel z en weg ! One person found this helpful", "tags": []}, {"r": 1, "t": "Nehme es seit ca 4 Wochen noch sehe ich keinen Erfolg", "tags": []}, {"r": 1, "t": "Nach 2 Jahren Einsatz, immer mal mehr oder wenig intensiv Nagel des großen Zeh eingepinselt, aber immer mindestens so stark, wie auf der Beschreibung angegeben. Es ist keine Änderung eingetreten. Ich hab sicher 6 Fläschchen aufgebraucht und mußte jetzt doch zum Arzt. Teurer Spaß. Arzt sagte sofort, daß dies mit so Mittel kaum geht.", "tags": []}, {"r": 1, "t": "Habe den Lack ca. 8 Monate verwendet und bin enttäuscht, vor allem bei dem Preis! In den ersten Wochen sind die Verfärbungen zeitweise kurz heller geworden, sahen dann aber irgendwann wieder gelblich aus. Auch als der Nagel nachgewachsen ist, sind die Stellen geblieben, keinerlei Verbesserung in Sicht. Bin jetzt auf ein Öl umgestiegen, bei dem ich nach 3 Wochen drei mal so viel Erfolg schon feststellen kann, als bei diesem Lack. Die Wirkung ist aber sicher auch von Person zu Person unterschiedlich.", "tags": []}, {"r": 1, "t": "Ich habe das Produkt jetzt vier Wochen lang täglich angewendet, ohne jegliches Resultat. Stattdessen hat sich mein behandelter Fussnagel milchig verfärbt. Während meines kürzlichen USA Aufenthaltes habe ich mich dort umgesehen und Rezensionen gelesen. Hierbei ist mir immer wieder ein Produkt aufgefallen, das ich dann auch bestellt habe. Und es wirkt wirklich bei 2 x täglicher Anwendung. Wird genau so aufgetragen wie Ciclopoli aber dann mit Watte in den Nagel einmassiert. Ich konnte dieses Produkt allerdings nicht im deutschen Internet finden.", "tags": []}, {"r": 1, "t": "Nur der Nagellack hat bei mir leider gar nicht geholfen. Ich nehme inzwischen zusätzlich Tabletten und soll diesen Nagellack aber laut Ärztin weiterhin verwenden. Inzwischen sehe ich Verbesserungen, aber ich weiß nicht,ob es nur an den Tabletten liegt, oder ob der Nagellack zusätzlich hilft.", "tags": []}, {"r": 1, "t": "Der Nagellack funktioniert nicht. Auch nach mehreren Fläschchen und einjähriger Benutzungsdauer keine Besserung. Als ich es meinem Hautarzt zeigte, lachte dieser nur. Laut dem Arzt kann das bei Nagelbeschwerden gar nicht helfen. Würde jedem vom Kauf abraten. One person found this helpful", "tags": []}, {"r": 1, "t": "Ich habe dieses Produkt nun über 1 Jahr reichlich angewandt, nachdem ich zuvor andere empfohlene Mittel zur schnellen Linderung und Besserung genommen hatte. Abgesehen von den nicht geringen Kosten, bei Erfolg hätten sich diese jedoch gelohnt, hatte ich auch keinerlei sichtbaren Erfolg, geschweige denn Besserung, daher kann ich auch nichts positives über dieses Mittel berichten. Nun versuche ich es mit weit kostengünstigeren Hausmitteln.", "tags": []}, {"r": 1, "t": "Obwohl mein Nagelpilz genau in den angeblichen Wirkungsbereich fällt sehe ich nach einem 3/4 Jahr keinerlei Verbesserung. Schade ums Geld.", "tags": []}, {"r": 1, "t": "Habe dieses Produkt genau nach Anleitung verwendet und es absolut nichts passiert, außer, dass sich etwas Nagelhaut abgelöst hat. Nach 2 Fläschen war mir dieses Produkt zu teuer und da sich der Nagel nicht verändert hat, nicht gesund nachwuchs, nein danke.", "tags": []}, {"r": 1, "t": "Verarschung", "tags": []}, {"r": 1, "t": "Die Hoffnung, den Nagelpilz am Nagel des großen Zehs einzudämmen oder gar zu beseitigen, haben sich leider nicht erfüllt.", "tags": []}, {"r": 1, "t": "Seit Monaten benutze ich dieses Produkt und keinerlei Besserung. Die Flasche ist nun leer\\... Geld zum Fenster raus geworfen\\... schade\\... One person found this helpful", "tags": []}, {"r": 1, "t": "Dieses Produkt hatte ich mir vor langer Zeit mal bestellt. Das Ergebnis war nicht zu frieden stellend. Deshalb würde ich es nicht weiter empfehlen One person found this helpful", "tags": []}, {"r": 1, "t": "Funktioniert nicht", "tags": []}, {"r": 1, "t": "Ich verwende dieses Mittel über ein Jahr täglich und der Pilz ist nach wie vor vorhanden. Die über Hundert Euro (3x gekauft) habe ich umsonst ausgegeben.", "tags": []}, {"r": 1, "t": "Bringt nix", "tags": []}, {"r": 1, "t": "Habe mich bewusst für ein hochpreisiges Produkt entschieden um eine Verbesserung zu erzielen. Glaube mit Kranwasser hätte ich den gleichen Effekt erzielt. Kann das Produkt definitiv nicht empfehlen.", "tags": []}, {"r": 1, "t": "aber leider null Wirkung. Ob es nun an der Hartnäckigkeit u/o Immunität gerade meines Pilzes liegt, oder an der generellen Unwirksamkeit des Produktes, kann ich nicht sagen. Aber trotz vorschriftsmäßiger Anwendung über Monate war der einzig wahrnehmbare Effekt der in meinem Portemonnaie. Für mich lautet das Ergebnis: Rausgeschmissenes Geld.", "tags": []}, {"r": 1, "t": "Das Mittel wirkt bei mir leider überhaupt nicht, das wird wohl von der Art des Pilzes abhängen, aber meiner lacht sich nur schief :-( One person found this helpful", "tags": []}, {"r": 1, "t": "sind Naturprodukte! Reviewed in Germany on 1 September 2019 Nach kurzer Anwendung hatte ich starke Hautschäden rund um die Fußnägel, die zu offenen Wunden führten. Eine Wirkung nach zweimonatigem Gebrauch gab es auch nicht. Da wirken Hausmittel und Naturöle und Cremes deutlich besser! One person found this helpful", "tags": []}, {"r": 1, "t": "keine Bewertung", "tags": []}, {"r": 1, "t": "Keine Wirkung bei Anwendung von einem Jahr !!? Preis -/Leistungsverhältnis damit völlig daneben !! Das Produkt hilft mit nicht! ? Kein Erfolg !?", "tags": []}, {"r": 1, "t": "Funktioniert bisher überhaupt nicht. Habe es einige Wochen in Verwendung. Null Effekt. Höher Preis. One person found this helpful", "tags": []}, {"r": 1, "t": "Dient wahrscheinlich nur zum Schutz vor Nagelpilz. Nach langer Anwendung war kein Erfolg sichtbar. Hoher Preis für null Erfolg. Schade! One person found this helpful", "tags": []}, {"r": 1, "t": "Der Preis ist super. Leider trocknen meine Nägel davon aus\\...Lackiere drüber, dann klappt's.", "tags": []}, {"r": 1, "t": "Leider überhaupt kein Erfolg zu sehen nach 9 Monaten. One person found this helpful", "tags": []}, {"r": 1, "t": "Hält nicht das versprochene\\.... Nehmt Olivenöl !! \\... wie in verschiedenen Foren im Netz beschrieben funktioniert super u viel billiger", "tags": []}, {"r": 1, "t": "Nach über 1.5 Jahren Anwendung hat sich leider nix getan. One person found this helpful", "tags": []}, {"r": 1, "t": "1 Jahr lang täglich aufgetragen und nix gebracht\\.....viel Geld für nix. Werde jetzt zur podologin gehen. One person found this helpful", "tags": []}, {"r": 1, "t": "Wahrscheinlich besteht das Mittel nur aus Wasser: Wirkung = 0, leider gibt\\'s nix anderes\\... One person found this helpful", "tags": []}, {"r": 1, "t": "Für den Preis ist das Mittel schlecht und nicht wirksam. Habe ein anderes günstigeres genommen - der Pilz ist weg!", "tags": []}, {"r": 1, "t": "Die Mühe kann man sich sparen, es wurde sogar etwas schlimmer.", "tags": []}, {"r": 1, "t": "Dauert sehr lange bis zum Erfolg", "tags": []}, {"r": 1, "t": "Ein Sterne zu viel nicht gut One person found this helpful", "tags": []}, {"r": 1, "t": "Ein sehr teures Produkt. Hilft aber, trotz gegenteiliger Behauptung, nicht gegen Nagelpilz. Ein teurer Flop. Keine Ahnung was den Hersteller veranlasst, dieses Produkt als das \\\"einzig wahre\\\" gegen Nagelpilz an zu preisen.", "tags": []}, {"r": 1, "t": "Hilft leider nichts. Kann ich nicht weiterempfehlen. One person found this helpful", "tags": []}, {"r": 1, "t": "Katastrophal. Leeres Paket geliefert One person found this helpful", "tags": []}, {"r": 1, "t": "Selbst nach mehreren Monaten in Anwendung ist leider keine Wirkung zu erkennen. Kann ich leider nicht weiterempfehlen. Also keine grosse Erwartungen haben.", "tags": []}, {"r": 1, "t": "Habe es über 6 Monate verwendet und schon das 3 mal bestellt\\... viel zu teuer und sehr wenig Erfolg One person found this helpful", "tags": []}, {"r": 1, "t": "Nach wochenlanger Anwendung konnte ich lediglich eine Verschlimmerung feststellen. Für den Preis gibt es mit Sicherheit bessere Mittel nach denen ich mich jetzt umgucken werde.", "tags": []}, {"r": 1, "t": "NöNöNö kompletter Blödsinn funktioniert nicht!", "tags": []}, {"r": 1, "t": "Wirkt überhaupt nicht. 7 Monate versucht ohne Erfolg. keine Verbesserung.", "tags": []}, {"r": 1, "t": "nichts. Reviewed in Germany on 9 June 2024 Alle äußerlich anwendbaren Mittel gegen Nagelpilz helfen nur einem -- dem Hersteller durch die horrenden Preise. Hatte viele Jahre mit Nagelpilz am großen Zeh zu kämpfen. Auch wenn ich den Nagel mit dem Dremel komplett abgeschliffen habe und wochenlang die Mittel aufgetragen habe, nichts half. Was mir letztlich geholfen hat, waren Terbinafin-Tabletten. Habe etwa sechs Monate lang täglich eine Tablette geschluckt, danach wöchentlich nur eine, wie mir ein befreundeter Arzt empfohlen hat. Pilz ist seit drei Jahren Geschichte. Und meine Leberwerte sind alle im grünen Bereich, obwohl es immer heißt, die Tabletten schaden der Leber.", "tags": []}, {"r": 1, "t": "behandeldeten Nägeln Reviewed in Germany on 10 May 2024 verursacht eingewachsene Fußnägel an den behandeldeten Nägeln. Hatten uns Gegenseitig mit Nagelpilz angesteckt. Also beide mit Ciclopoli behandelt. Nach ein paar Wochen haben wir BEIDE eingewachsene Nägel bekommen. Zuvor hatten wir noch nie eingewachsene Fußnägel. Grausames Produkt. Werden jetzt das Hausmittel 25% Essig nehmen und den Fuß damit behandeln.", "tags": []}, {"r": 1, "t": "Habe das Produkt 2 Jahre angewendet, kein Erfolg, es ist eher schlimmer geworden", "tags": []}, {"r": 1, "t": "Ich nehme CICLOPOLI heute seit einem Jahr. Anwendung nach Anleitung. Nichts für Diabetiker. Funktioniert einfach nicht, kostet bloß viel Geld. Tipp: Finger weg - auch nicht vom Arzt aufschwatzen lassen! Einen Stern, weil es anders nicht geht.", "tags": []}, {"r": 1, "t": "Onychomykose = Pilzinfektion aller infrage kommenden Nägel, hier speziell 5 meiner Fußnägel - ein hartnäckiges Langzeitereignis. Bisher haben bei mir reihenweise verschiedenste Nagellacke, z.B. Ciclopoli (teuer, sehr teuer) Langzeit- Wirkungslosigkeit erzeugt. Natürlich immer in Selbstbehandlung! Mit diesen Erfahrungen kommt man zwangsläufig zu dem Schluss, Langzeitanwendungen verschiedenster Mittelchen zwecklos - Geldverschwedung! Erfolgsaussichten lassen sich steigern mit einem erfahrenen Dermatologen oder einer Dermatologin. Dringen auf Kombibehandlung mittels innerer (Tabletten), äußerer (\\\"Mittelchen\\\") plus Lasereinsatz. Diese Erkenntnisse haben endlich (nach Jahren !) Erfolg gebracht.", "tags": []}, {"r": 1, "t": "Habe es zwei Jahre regelmäßig gemacht ,nach Anleitung.Erst sah es vielversprechend aus dann nach fast zwei Jahren,als hätte der Pilz sich dran gewöhnt.Bin jetzt bei teebaumöl ,mal sehen", "tags": []}, {"r": 1, "t": "1 Jahr Anwendung und keine Besserung. Zeitweise verändert sich zwar der Nagel, aber von Heilung kann keine Rede sein. Trotz 2x täglicher Anwendung. Rausgeschmissenes Geld, wirklich. Lieber etwas recherchieren und ein richtiges Mittel nutzen ☝🏽 One person found this helpful", "tags": []}, {"r": 1, "t": "Ich habe über ein Jahr Geld für diese zu teure wirkungslos Mittel gezahlt und bin jetzt auf Exoderil-Gel umgestiegen. Viel günstiger und endlich ist ein Erfolg zu sehen und ein gesünder Nagel wächst nach.", "tags": []}, {"r": 1, "t": "Nach 1 Jahr keine Besserung. Leider nicht zu empfehlen. Ich kann die anderen Bewertungen nicht verstehen. Daher bin ich weiter auf der Suche nach einer Lösung", "tags": []}, {"r": 1, "t": "Hat bei mir nach einem Jahr absolut kein Ergebnis gesehen.", "tags": []}, {"r": 1, "t": "Ich habe Ciclopoli 2 (zwei) Jahre vorschriftsmäßig nach Vorgaben des Herstellers aufgetragen. Keinerlei Erfolg. Meine Nägel sehen unverändert aus. Es hat nur dem Hersteller und dem Apotheker geholfen und mein Podologe hat sich halb Tod gelacht. Wieder einmal eine Werbelüge. Ich musste aber, bei Amazon üblich, einen Stern geben. One person found this helpful", "tags": []}, {"r": 1, "t": "Hat sich nicht bewährt. 1 Jahr benutzt", "tags": []}, {"r": 1, "t": "Ich habe Ciclopoli 3Jahre lang verwendet und ich muss leider sagen, gewirkt hat es nicht. Mag sein, dass der Nagelpilz dadurch eingedämmt wird, aber von einer wirklichen Heilung kann man nicht sprechen. Das Produkt ist im Verhältnis zu anderen Produkten auch sehr teuer. Ich kann es daher nicht empfehlen. Für mich waren das 3 verschwendete Jahre und Geld aus dem Fenster geworfen.", "tags": []}, {"r": 1, "t": "Leider hat der Nagellack bei mir auch nach 7 Monaten überhaupt nicht genützt..", "tags": []}, {"r": 1, "t": "Nachdem ich 2 Fläschlein für jeweils 27,95 aufgebraucht habe ohne das sich nennenswerte Ergebnisse gezeigt haben, habe ich mein Problem innerhalb von 3 Monaten sehr effektiv mit Essig-Essenz und Teebaumöl gelöst. Zwei mal täglich die Nägel mit einem mit Essigessenz getränkten Wattepad abgerieben, danach Teebaumöl aufgetragen. Problem erledigt. Zur Prophylaxe wiederhole ich den Vorgang mittlerweile 1-2 Mal wöchentlich jeweils nach dem Duschen.", "tags": []}, {"r": 1, "t": "Ich trage jetzt seit fast 2 Jahren täglich, z.T. mehrfach, z.B. nach dem Sport/Duschen, den Lack auf aber die Wirkung ist gleich null. Keine Besserung und erst recht keine komplette Heilung in Sicht. Ich bin total frustriert. Das tägliche Auftragen über so einen langen Zeitraum nervt total und viel Geld hat es mich auch gekostet. Werde wohl nochmal zum Hautarzt gehen und fragen was wirklich hilft.", "tags": []}, {"r": 1, "t": "schlimmer Reviewed in Germany on 9 April 2019 Ich habe das Präparat nun 9 Monate verwendet. Anfänglich dachte ich, dass es hilft. Allerdings wurde es dan relativ schnell immer schlimmer so dass ich behaupten kann, dass es bei mir keinerlei Wirkung erzielt hatte. Man könnte es ja auf Gut Glück versuchen, aber bei diesem horrenden Preis kann ich nur davon abraten. Ich bin auf ein natürliches Pflegeöl gewechselt und kann sagen, dass dies mehr Wirkung zeigt.", "tags": []}, {"r": 1, "t": "Ich habe an 4 Zehen Nagelpilz. Nach 3 Wochen Anwendung hab ich Ciclopoli in den Müll geschmissen, weil sich wirklich 0 Verbesserung bemerkbar gemacht hat. Bin auf Fungustan umgestiegen und trage das Mittel mit einem kleinen Pinsel auf meine Zehen auf. 50ML für 19€ und nach 3 Wochen schon mehr Nagelpilz verloren, als mit jedem anderen Lack oder Öl. One person found this helpful", "tags": []}, {"r": 1, "t": "Bereits nach kurzer Anwendungsdauer (1-2 Wochen) kam es zu einer extremen Verschlechterung des Pilzbefalls. Nicht der bereits befallene Teil des Nagels verbesserte sich, sondern der Pilz breitete sich schlagartig auf den noch unbefallenen, gesunden Teil des Nagels aus, der bislang konstant pilzfrei war. Die Folge: Der Pilz ist nun bis zur Wachstumszone (Nagelmatrix) vorgedrungen. Deshalb kann ich - zumindest für meinen individuellen Fall sprechend - von der Verwendung des Nagellackes nur abraten!", "tags": []}, {"r": 1, "t": "Ich habe den Nagellack vier Monate jeden Tag aufgetragen. Es hat nichts gebracht. Der Nagel sieht wie vorher aus. Ich werde ein anderes Präparat versuchen. One person found this helpful", "tags": []}, {"r": 1, "t": "Ich benutze das Mittel seit drei Jahren. Leider ohne Erfolg. Es ist nur teuer.", "tags": []}, {"r": 1, "t": "4 Monaten null Wirkung gezeigt! Reviewed in Germany on 17 January 2017 Nach einem Besuch beim Hautarzt, hat der Arzt seine Helferin gebeten, eine Stichprobe von meinen Fußnägeln zu nehmen. Einige Wochen später war ich wieder beim Arzt und das Ergebnis ist Nagelpilz meinte er und er hat mir Ciclopoli verschrieben. 4 Monate lang habe ich jede einzelne Nacht das Ding reichlich auf die Nägeln getragen.. Leider hat es gar keine Wirkung gezeigt. Ciclopoli, die Mühe und dazu noch der Arztbesuch waren nur Geld- und Zeitverschwendung.", "tags": []}, {"r": 1, "t": "Sehr teuer und hilft trotzdem nicht. Warum gibt es für diese lästige Krankheit kein Mittel wo auch wirklich hilft? Wo dann!", "tags": []}, {"r": 1, "t": "Also mir hat das auch nicht geholfen. Trotz konsequenter Anwendung über einen Zeitraum von über zwölf Monaten! und einem kompletten Abtragen des betroffenen Nagelmaterials habe ich keine Verbesserung feststellen können. Selbst bei einem zweiten nur ganz leicht betroffenen Nagel ging der Pilz nicht weg. Viel Geld rausgeschmissen für nichts!", "tags": []}, {"r": 1, "t": "Habe diesen Lack fast ein Jahr diszipliniert auf meinen Daumennagelpilz angewandt. Einmal fiel mir der Nagel komplett ab, mein Arzt empfahl weiterzumachen. Als dann der neue junge Nagel nachwuchs, war bald wieder eine Infektion zu erkennen (nachdem er zu 2/3 gesund nachgewachsen war). Und womit hab ich den Pilz letztenendes wegbekommen? Mit ganz normalem Teebaumöl aus der Apotheke. 2 mal am Tag unverdünnt eingerieben und so war mit einer 5Euro-Flasche der Nagel bald wieder gesund nachgewachsen. Fazit zum Lack: Nie wieder, viel Geld für nix!", "tags": []}, {"r": 1, "t": "was es soll. Reviewed in Germany on 28 February 2021 Frechheit! Ich hatte über Jahre zwei von Nagelpilz befallene Zehennägel. Alle anderen Nägel waren sauber und gesund. Nun habe ich mich entschlossen was gegen den Pilz zu unternehmen. Wollte für den Sommer ansehnliche Nägel haben. Ich habe zur Prophylaxe die 4 benachbarten Zehennägel auch mit dem Lack lackiert. Nachdem ich die Behandlung jetzt 3 Wochen durchgeführt habe, bin ich den Tränen nah. Und zwar habe ich jetzt an allen 10 Nägeln Pilz. Jahrelang hatte sich der Pilz nur auf die zwei erwähnten Nägel konzentriert und durch dieses Mittel wurden innerhalb von nur drei Wochen alle Zahennägel befallen. Wie das möglich ist, ist mir ein Rätsel. Man sollte den Hersteller verklagen. Es ist eine reine Verbrauchertäuschung und Betrug! Wollt ihr euch Enttäuschung und Frustration ersparen, kauft bloß nicht dieses Ciclopoli. Ich kann nur jedem abraten dieses Mittel zu verwenden.", "tags": []}, {"r": 1, "t": "Benutze das Produkt jetzt seit 9 Monaten. Es ist überhaupt keine Besserung eingetreten. Habe bisher 2 Flaschen verbraucht, also über 60€ für die Tonne. Sehr schade!", "tags": []}, {"r": 2, "t": "Hey meine Lieben, leider hat mir dieses Produkt so ziemlich garnicht geholfen. Das Zeug scheint zwar zu funktionieren jedoch wird es definitiv überbewertet, und der Preis dafür ist einfach gnadenlos übertrieben. Hab jetzt eine Creme bestellt wenn es besser wirken sollte kann ich mich hier gerne nochmals melden. Bitte daumen hoch wenn interesse besteht dann würde ich die Rezension ändern und den Namen der Creme erwähnen ( natürlich nur wenns auch wirklich wirkt) beste grüße\\...", "tags": []}, {"r": 2, "t": "Ich benutze das Produkt nunmehr seit ca 18 Monaten,der Erfolg lässt auf sich warten, ich werde das mal mit meinem Dermatologen besprechen und werde dann mit der Beurteilung weiter machen", "tags": []}, {"r": 2, "t": "Dieses Produkt erfüllt absolut nicht meinen Erwartungen. Ich nehme es fast ein Jahr und ich bemerke nichts. Das war meine letzte Bestellung", "tags": []}, {"r": 2, "t": "besser geworden Reviewed in Germany on 27 October 2021 Verstehe den Hype und die hunderte, guten Rezensionen um dieses Produkt nicht. Man muss es täglich auftragen, da es bereits beim Duschen durch Wasser entfernt wird. Ich konnte nach der Anwendung keine Veränderung feststellen: Das heißt es ist weder besser, noch schlechter geworden. Ich werde zukünftig beim Loceryl Nagellack bleiben. Danke, aber nein Danke - deshalb nur 2xSterne von mir.", "tags": []}, {"r": 2, "t": "Nach vielen Mitteln hab ich mal Probiert mit Ciclopoli meinen Nagelpilz zu bekämpfen leider mit mäßigem Erfolg. Ein Nagel wurde etwas besser der mit am wenigsten befall. Der zweite Nagel mit etwas mehr gab gar keine Veränderungen. Evt bei leichtem Nagelpilz zu gebrauchen ganz weg ging es bei mir damit nicht dafür ist es einfach zu Teuer. Nur bedingt zu empfehlen jetzt gehe ich zum Hautarzt.", "tags": []}, {"r": 2, "t": "Das Produkt selbst ist absolut in Ordnung. Der Versand mit DPD nicht. Leider wird hier nie - und wirklich nie - geklingelt, obwohl zu gegebener Zeit immer zuhause. Hier muss sich der Versender einen anderen Logistikdienst suchen. One person found this helpful", "tags": []}, {"r": 2, "t": "nach Anwendung über 1 bis 2 Jahre kein Erfolg", "tags": []}, {"r": 2, "t": "Nach Monaten zeigt sich endlich Erfolg. Man muss nur konsequent dran bleiben. Nägel werden allerdings weiß.", "tags": []}, {"r": 2, "t": "Bin auf anderes Produkt umgestiegen, das hilft tatsächlich!", "tags": []}, {"r": 2, "t": "Die Verpachung war aufgerissen und auch die verpachung des Fläschchens war ebenso aufgerissen.", "tags": []}, {"r": 2, "t": "Ich benutze das Produkt ziemlich genau seit zwei Jahren und die einzige Reaktion bzw. Wirkung ist, dass sich der Befall nicht weiter verschlimmert hat. Von einer Besserung kann leider nicht die Rede sein. Der hier bereits mehrfach kritisierte Preis ist wohl die nachhaltigste Reaktion - im Geldbeutel, aber leider nicht beim Befall.", "tags": []}, {"r": 2, "t": "Hersteller verspricht das sich der Nagelpilz so nach u. Nach bekämpft wird u. Herauswächst. Der befallene Fußnagel wächst und der Nagelpilz ist innerlich da. Dieses Produkt war ein fehlkauf.", "tags": []}, {"r": 2, "t": "Keine Wirkung weil der Pilz nur über das Blut zu kriegen ist.", "tags": []}, {"r": 2, "t": "Schnelle Lieferung! Hilft nur dem hersteller da ohne Wirkung!!!", "tags": []}, {"r": 2, "t": "Habe schon die 3flasche benutze es genau nach Anweisung,sehe aber wenig Unterschied. One person found this helpful", "tags": []}, {"r": 2, "t": "Das Mini-Fläschchen ist schnell aufgebraucht. Eine Verbesserung kann ich nach mehreren Wochen Anwendung noch nicht erkennen. Preis-Leistung passt leider gar nicht.", "tags": []}, {"r": 2, "t": "Leute kauft Euch den wasserunlöslichen Lack und feilt vorher Eure Zehnägel runter. Mit Nagelpilz ist nicht zu spassen.", "tags": []}, {"r": 2, "t": "Ich habe Ciclopoli für viel Geld in der Apotheke gekauft. Ich verwende es nun schon seit zwei Monaten, jeden Morgen nach dem Duschen. Als ich mit der Behandlung anfing war nur die Hälfte meines großen Zehennagels betroffen. Seit der Behandlung hat sich der Pilz jetzt sogar auf dem kompletten Nagel ausgebreitet! Ich breche jetzt die Behandlung ab und versuche es mal mit einem günstigeren Mittel aus der Drogerie. Schlimmer kann\\'s ja nicht werden. Zwei Sterne gebe ich, weil es durchaus einfach aufzutragen ist und sehr schnell trocknet.", "tags": []}, {"r": 2, "t": "Habe durch eine Empfehlung in der Apotheke eine 6,6ml-Flasche Ciclopoli gekauft und auf einige kleine Zehennägel angewendet. Mit der Dosierung nach Packungsbeilage hat das Fläschchen ein halbes Jahr gereicht, wobei ich während dieser Zeit (So/Herbst 2018) vor allem Sandalen genutzt habe, um unnötiges Schwitzen zu vermeiden. Wie beschrieben habe ich die Nägel kurz gehalten und gelegentlich gefeilt. Nach dem halben Jahr war der Fußnagelpilz kein bisschen besser geworden und ich habe deswegen auf eine erneute Investition von 40€ verzichtet und teste nun Alternativen. Das Auftragen ist einfach, wobei man gegen Ende der Flasche etwas Mühe hat, mit dem Pinsel noch die Flüssigkeitsreste herauszubekommen. Durch die oben offene Flasche besteht die Gefahr, dass man versehentlich bei der Anwendung den sowieso schon arg winzigen Inhalt der Flasche verschüttet - hier ist Vorsicht geboten. (Bei manch anderen Mitteln besteht dieses Problem nicht.) One person found this helpful", "tags": []}, {"r": 2, "t": "Nach Monate langen Behandlung leider keine Besserung", "tags": []}, {"r": 2, "t": "Habe mehrere mittel ausprobiert, aber das ist das beste dauert lang aber das ergebnis ist sehr gut. So habe es aufgegeben bin zum Hautarzt habe 50 € für Lasern bezahlt und nehme Tabletten, vom Arzt verschrieben und jetzt ist ruhe hätte viel Geld und Zeit sparen können also geht lieber zum Arzt", "tags": []}, {"r": 3, "t": "Elektrische Nagelfräse! Reviewed in Germany on 28 June 2023 Ich habe über 7 Jahre lang mit Nagelpilz an einem großen Zeh laboriert, der überaus hartnäckig war: \\- Zuerst mehrfach Ciclopoli gekauft und länger täglich verwendet. \\- Dabei habe ich auch versucht, die schadhafte Stelle mit dem Nagelclipser möglichst umfassend zu entfernen. \\- Währenddessen mehrfach zum Arzt, der ebenfalls Ciclopoli empfahl und gelegentlich die schadhafte Stelle am Nagel abfräste. \\- Schließlich verschrieb mir der Arzt zur Verstärkung der Wirkung ein Fungizid zur Einnahme (Tabletten), das aber Nebenwirkungen in Form schlechter Leberwerte und Sehstörungen hatte und deshalb wieder abgesetzt wurde. \\- Auch das Canesten Nagelset habe ich mehrfach verwendet, sowie Canesten Fungizid-Salbe. \\- Auch das nicht wasserlösliche und nur 1x wöchentlich aufzutragende Ciclopirox habe ich länger verwendet. Somit hatte ich über Jahre einen riesigen Zeitaufwand und nicht unerhebliche Kosten, der Nagelpilz wuchs aber immer an der gleichen Stelle nach. Was schließlich in wenigen Monaten Abhilfe schaffte: \\- Eine elektrische Nagelfräse (https://www.amazon.de/gp/product/B07L9DK5TK), mit der ich die befallene Stelle viel besser als mit Clipser oder Nagelschere vollständig und weitaus weniger verletzungsanfällig entfernen konnte. \\- Parallel habe ich Ciclopirox weiter verwendet (davon gibt es verschiedene Hersteller, erheblich preiswerter als Ciclopoli und nur 1x wöchentlich aufzutragen). \\- Unterstützend wirken auch atmungsaktive (Haus-)Schuhe/Socken, die für trockene und nicht schwitzende Zehen sorgen. Hätte ich die Nagelfräse mal gleich ausprobiert.", "tags": []}, {"r": 3, "t": "Hilft nur mäßig", "tags": []}, {"r": 3, "t": "das Mittel wirkt, es dauert aber sehr lange, wir sprechen über Monate. Ich habe ein Mittel gefunden, das besser wirkt und deutlich günstiger ist", "tags": []}, {"r": 3, "t": "Es sollte mit das beste was es gibt sein,aber es dauert ewig.ich nehme es regelmäßig", "tags": []}, {"r": 3, "t": "\\.... es wirkt \\... jedoch auch nach langer Anwendung über drei Monate hinweg bleiben in der Tiefe Restpilzspuren! Der nagel schaut gesund aus , wächst gut nach , nur ich fürchte dass der Pilz nicht restlos besiregt wurde. One person found this helpful", "tags": []}, {"r": 3, "t": "Bestens", "tags": []}, {"r": 3, "t": "Es ist sehr einfach aufzutragen. Es ist auch eine lange Behandlung. One person found this helpful", "tags": []}, {"r": 3, "t": "Also es ist wirklich eins der wenigen Pilzmittel die den Pilz wirklich ein bisschen eindämmen .Ich selbst bin auch direkt zum Hautartz und habe mir Tabletten zusätzlich verschreiben lassen den anders wird man nicht her der Lage ,obwohl ich nur leichten befall habe aber selbst das sagen die Hautärtze den Pilz ist sehr hartnäckig und dauert sehr lange bis er weg geht wenn überhaupt.Ich finde der Pinsel der Flasche ist echt total Billig franselt leider etwas nix dolles , den man muss ja auch unter den Nagel lackieren.Leider muss ich dazu sagen ist der Lack generell sehr teuer.", "tags": []}, {"r": 3, "t": "ich glaube es gibt besseres für das Geld One person found this helpful", "tags": []}, {"r": 3, "t": "Leider dauert der Erfolg sehr lange. Mein Mann nimmt es jetzt schon einige Jahre und so langsam sieht man einen Erfolg\\.... Wenn es nach mir gehen würde, ich bestellte was anderes", "tags": []}, {"r": 3, "t": "Auch bei genauer Anwendung ein mäßiges Ergebnis.Zu teuer.", "tags": []}, {"r": 3, "t": "Seit 4 Monaten jeden Tag zwei Mal gepinselt bis jetzt kein sichtbarer Erfolg", "tags": []}, {"r": 3, "t": "Es wird nicht schlechter, aber besser eigentlich auch nicht One person found this helpful", "tags": []}, {"r": 3, "t": "Lange benutzt keine Besserung bemerkt. Lässt sich gut auftragen, geruchs neutral, trocknet schnell, auf Haut neben Zehnagel Reizungen und rot geworden aber erträglich bei öffter nutzung verschwunden. Nagel immer noch gerissen und Gelb stumpf beim nachwachsen. Nutze es gut 10 Monaten One person found this helpful", "tags": []}, {"r": 3, "t": "Also die Verpackung für die kleine Flasche Nagellack war VIEL zu GROß !!! Die Lieferung und der Preis sind O.K. Zu der Wirkung kann Ich noch nichts sagen denn Ich bin noch am Anfang der Anwendung !!! ich überlege mir aber ob ich nochmal bestelle weger der viel zu großen verpackung der Umwelt zu Liebe !!!!!!!!!!!", "tags": []}, {"r": 3, "t": "Hab es angefangen zu benutzen, ist sehr teuer das zeug und hab keine ahnung ob es mir helfen wird, gebe es fur jetzt 3/5 sterne und macht 2-3 monaten gebe ich ein update hier und werden dann mehr sterne geben oder weniger. One person found this helpful", "tags": []}, {"r": 3, "t": "Wenn ich täglich dran denke es aufzutragen, wird es ein kleines bisschen besser. Man muss echt dran bleiben, um überhaupt eine Besserung zu sehen. Bei mir war sie allerdings so minimal, dass ich noch am überlegen bin, ob ich das Produkt nachkaufe, jetzt wo es fast leer ist. Andere Produkte haben mir nämlich überhaupt nicht geholfen. Gut finde ich, dass es nicht streng riecht und schnell einzieht", "tags": []}, {"r": 3, "t": "Keine wirkliche Besserung", "tags": []}, {"r": 3, "t": "Hier wird richtig Geld gemacht. Das Ergebnis könnte besser sein. One person found this helpful", "tags": []}, {"r": 3, "t": "abwarten\\... Reviewed in Germany on 8 May 2022 Kam schnell\\....finde es wie all diese Art der Produkte einfach zu teuer\\... Abwarten..", "tags": []}, {"r": 3, "t": "Wirkung erfolglos One person found this helpful", "tags": []}, {"r": 3, "t": "Preis", "tags": []}, {"r": 3, "t": "data on the product performance as of yet Reviewed in Germany on 27 October 2021 in general, the product seems to do it\\'s job\\.... time will tell", "tags": []}, {"r": 3, "t": "Bei der Frau war nur ein Drittel des Nagel befallen. Da funktioniert der Lack recht gut und ist auch jetzt herausgewachsen. Ich selbst bin schon viele Jahre damit geplagt. Nagel bis ins Bett befallen. Auch noch mehrere Nägel. Da ist der Versuch zwecklos!!!! Habe es echt konsequent mehr als ein Jahr versucht. Nehme jetzt Terbinafin oral ein. Hoffentlich geht es so weg.", "tags": []}, {"r": 3, "t": "Benutze es seid 3 Monaten, kleine Besserung schon sichtbar, hoffe auf Ausheilung des Nagelpilz.", "tags": []}, {"r": 3, "t": "Die Verpackung für die kleine Flasche Nagellack war VIEL zu GROß !!! Die Lieferung und der Preis sind O.K.", "tags": []}, {"r": 3, "t": "Das Produkt muss lange angewandt werden bis ein Erfolg zu sehen ist.", "tags": []}, {"r": 3, "t": "Nach 3 Wochen noch keine wesentliche Besserung.", "tags": []}, {"r": 3, "t": "An sich ein gutes Produkt, aber die wasserlöslichkeit zwingt einen es nur nachts aufzutragen. One person found this helpful", "tags": []}, {"r": 3, "t": "War alles in Ordnung. Allerdings fand ich die Verpackung zuviel für so ein kleines Teil. One person found this helpful", "tags": []}, {"r": 3, "t": "Warte immer noch auf den Erfolg. One person found this helpful", "tags": []}, {"r": 3, "t": "Prudukt passt, wie gewohnt, aber die Verpackung von Vitalsana ist halt total daneben", "tags": []}, {"r": 3, "t": "Tut was es soll. One person found this helpful", "tags": []}, {"r": 3, "t": "Wirkt langsam. Glaube es gibt auch andere Mittel die efektiver sind. Es ist gut: man erkennt Fortschritte. Mal sehen wie lange die Wirkung anhält", "tags": []}, {"r": 3, "t": "Sehr zufrieden danke One person found this helpful", "tags": []}, {"r": 3, "t": "Ich benutze es so lange schon aber es wird nicht besser.", "tags": []}, {"r": 3, "t": "Die guten Anfangs Resultate setzen sich leider nicht fort. Ich werde etwas pausieren und dann noch einmal weiter machen bis zur vollen Wirkung wie ich hoffe.", "tags": []}, {"r": 3, "t": "Geduld und Ausdauer abverlangt\\... Reviewed in Germany on 31 March 2019 Produkt okay, Lieferung pünktlich, die Verpackung überdimensional", "tags": []}, {"r": 3, "t": "Also, nach einem Jahr täglichen Auftragen nach der Dusche ist der Nagelpilz immer noch da. Aber nicht so stark wie anfangs.", "tags": []}, {"r": 3, "t": "Der Zeitaufwand bis das Mittel wirkt ist sehr lang und ob es wirkt kann man jetzt noch nicht sagen. Die Anwendung ist einfach aber nur was für Leute die ausdauernd sind.", "tags": []}, {"r": 3, "t": "überrascht, und würde dieses Produkt gerne wieder kaufen wenn es soweit ist Reviewed in Germany on 25 August 2016 Ich freue mich sehr, dass dieses Produkt mich überrascht, und würde dieses Produkt gerne wieder kaufen wenn es soweit ist", "tags": []}, {"r": 3, "t": "Bei den ersten 2, 3 Fläschchen sah man eine Verbesserung. Leider habe ich abgebrochen. Nach 1 Jahr habe ich wieder mit der Behandlung angefangen, seitdem wirkt es nicht mehr. Ich probiere jetzt mal eine andere Marke.", "tags": []}, {"r": 3, "t": "Benutze es seit August 2020 und habe gemerkt, dass der Nagel mehr Stabilität und Glanz bekommen hat, jedoch die Anwendung sehr mühselig ist. Habe den Grosszehnagel zu tief geschnitten und dadurch einen eingewachsenen Zehnagel inklusive Nagelpilz an der Kante bekommen. Somit war das ein Teufelskreis aus beiden. Dazu musste erstmal die nagelfalz für 2 Monate regelmäßig ramponiert werden, um ein Einwachsen zu verhindern. Soweit so gut, hab ich die gelbliche Verfärbung an der Kante während der ciclopoli Anwendung bekommen und die Haut um den Nagel herum reagierte anfangs sehr sensibel darauf\\....Ich hoffe mal dass es in Kombinarion mit den Tabletten rauswächst. Habe in Studien gelesen, dass die mykologische Heilungsrate nur 5-7% beträgt und Mineralstoffmangel dazu prädestiniert\\...", "tags": []}, {"r": 3, "t": "Also einem mus klar sein dass es eine Flasche nicht reicht. Es wirkt zwar aber ich bin inzwischen bei der vierten Flasche und ich bin mit meinem Nagelpilz immer noch nicht fertig. Ich schätze das ich am ende bei 200 Euro lande. Billig ist das nicht. Aber es funktionier am besten von allen Mitteln die ich benutzt habe. One person found this helpful", "tags": []}, {"r": 3, "t": "Dies ist die dritte Flasche, die ich benutze, und aus irgendeinem Grund werden meine Nägel immer schlechter. Aber ich benutze es jeden Tag.", "tags": []}, {"r": 4, "t": "Nagelpilz ist leider was sehr lästiges, was immer wieder kommen kann. Ich habe daher schon eine Fülle an verschiedenen Mitteln ausprobiert und den Nagelpilz zwar immer wieder los bekommen, jedoch kam er danach irgendwann zurück. Dieses mal leider schlimmer als zuvor. Da meine bisherigen Mittel nichts gebracht haben, bin ich zum Hautarzt und dieser hat mir empfohlen Ciclopoli zu kaufen. Da es ja etwas länger dauert bis der Nagel rauswächst, am besten gleich 2-3 Packungen. Die Anwendung: Damit es wirklich was bringt, muss man es mindestens 1x am Tag auftragen. Ich habe die Anwendung regelmäßig 2x am Tag gemacht. Das alleine reicht aber nicht. Am besten man bestellt sich auch noch gleich Desinfektionsmittel und desinfiziert den Nagel immer regelmäßig. Fazit: Ja das Mittel hilft, jedoch ist eine akribisch regelmäßige Anwendung notwendig über sehr langen Zeitraum. Wer das ganze noch etwas beschleunigen will, der geht am besten noch regelmäßig zur Fußpflege, damit die befallene Stelle regelmäßig entfernt wird (sofern möglich). Oder man legt selbst Hand an mit einem Dremel (kein Witz -\\> funktioniert).", "tags": []}, {"r": 4, "t": "Das Fläschchen geht dem Ende zu. Bisher ist der Erfolg ausgeblieben. Jetzt stellt sich der Erfolg ein. Langsam aber sicher.", "tags": []}, {"r": 4, "t": "Hat bei mir nicht geholfen, vielleicht habe ich auch nicht alles richtig gemacht.", "tags": []}, {"r": 4, "t": "Es dauert halt ewig, bis eine Wirkung zu sehen ist\\...Wie bei allen anderen gängigen Produkten auch. Ich finde es insgesamt schade, dass sich da nicht viel tut auf dem Markt. Vorallem sind diese Lacke alles andere als günstig One person found this helpful", "tags": []}, {"r": 4, "t": "Ist auf jedenfall preislich top in der Apotheke wird man mindestens 15-20€ mehr zahlen hilft bei täglicher Anwendung definitiv ABER es wird je nach Stärke der befallenen stellen Wochen oder mehrere Monate dauern", "tags": []}, {"r": 4, "t": "Beide große Zehen, einen neben den großen und die beiden kleinen Zehen waren mehr oder weniger betroffenen. Allerdings nicht bis Hälfte des Nagels. Am Anfang war ich bisschen skeptisch, weil wenn mehrere Nägel betroffen sind muss man zusätzlich eine systematische Therapie also Tabletten nehmen, was ich nicht wollte wegen die NW, aber mittlerweile nach fast über einem Jahr muss ich allen Mut machen, dass das Produkt wirkt. 👍 Es braucht Zeit und strenge Kontinuität !!!! Ich bin immer noch dabei fleißig jede Nacht vor dem Bett gehen einzupinseln und möchte vorsichtshalber noch ein halbes Jahr weiter behandeln. Aber vielleicht hängt es davon ab was für ein Erreger dahinter steckt und wie schlimm die Ausgangssituation war. Es lohnt sich auszuprobieren !", "tags": []}, {"r": 4, "t": "Das Mittel ist das \\...\\....zigste das ich gegen den Nagelpilz ausprobiert habe. Das ist das erste das Erfolg gebracht hat. Nachteil: man muss es konsequent anwenden und nur wenn man Glück hat reicht ein Fläschchen. Bei mir hat\\'s rund ein Jahr gebraucht bis der Nagel des großen Zehs rausgewachsen war. Außerdem find ich\\'s doch Recht teuer..", "tags": []}, {"r": 4, "t": "normalerweise schreibe ich hier kaum eine Rezension aber da dises Thema vermtlich vielen am Herzen liegt nun ein kurzer Bericht von mir\\... es klappt. Selbst wenn die Nägel alle betroffen sind und bis zur Wurzel kaputt sind funktioniert es. Nach 2-3 Wochen kann man sehen wie ein gesunder Nagel nachwächst. Ich nutze dieses Mittel nun seit ca. 6 Monaten täglich und ich denke der halbe Weg ist geschafft. So ein Zehennagel wächst leider sehr langsam. Ein Tip: bei mir steht das Mittel direkt neben der Toilette sichtbar und daher werde ich täglich daran erinnert zu tupfen. Warum nur 4 Sterne: Ich finde der Preis ist nahe an unverschämt für diese kleine Menge\\... ich habe sicher schon 7-8x die 6,6ml Flasche gekauft und am Ende gehen wohl fast 500€ für die Behandlung drauf\\...puh\\... aber es wirkt und ich bin zufrieden damit angefangen zu haben\\....", "tags": []}, {"r": 4, "t": "Ich hoffe, dass das Mittel das hält, was es verspricht. Ich hoffe die positiven Rezessionen haben recht.", "tags": []}, {"r": 4, "t": "Das Produkt kenne ich, also alles o.k. Allerdings wurde das Produkt mit Abgaben 8x5x5cm in einem Karton von 25x15x15cm geliefert. Umweltfreundlich ist was anderes, daher ein Punkt Abzug. One person found this helpful", "tags": []}, {"r": 4, "t": "nützlich One person found this helpful", "tags": []}, {"r": 4, "t": "Das Produkt an sich kann sehr gut sein, leider fehlt in der Gebrauchsanleitung das wichtigste: Der Nagel muss aufgerauht sein um das Mittel von dem Nagel in Richtung Nagelbett auf zu streichen. Nach drei Monaten muss eine Unterbrechung erfolgen.", "tags": []}, {"r": 4, "t": "Es ist eine Besserung zu erkennen, bei einer Regelmäßigen Benutzung. Nagelpitz ist leider eine zähe Geschichte.", "tags": []}, {"r": 4, "t": "CICLOPOLI gegen Nagelpilz ist bei Täglicher anwendung ideal für die Heilung des Nagelpilz One person found this helpful", "tags": []}, {"r": 4, "t": "habe es schon öfter benutzt, hilft\\... aber es dauert seine Zeit", "tags": []}, {"r": 4, "t": "Behandlung ist einfach", "tags": []}, {"r": 4, "t": "Endlich ein Mittel welches hilft. Das einzige negative ist der Preis, wenn man bedenkt das die Anwendung sehr lange dauert und man noch einige Flaschen braucht.", "tags": []}, {"r": 4, "t": "Benutze den Nagellack nun eine ganze Weile und war erst enttäuscht, da sich meine Nägel gelb verfärbt haben und Krusten gebildet haben vom Nagellack\\... Aber es scheint doch zu wirken, denn ich erkenne nun eine sichtbare Linie, an der entlang der verdickte befallene Nagel rauswächst. Ich bin also optimistisch und verwende ihn weiter\\... Hoffentlich sind meine Nägel bis zum nächsten Sommer bereit für Flipflops, in diesem Zustand kann ich sie leider noch nicht zeigen :( Man muss also viel Geduld aufbringen", "tags": []}, {"r": 4, "t": "Schnelle Lieferung. Bis jetzt zufrieden.", "tags": []}, {"r": 4, "t": "Nehme ich schon über 2 Jahre. Es wird ganz langsam besser, warte noch auf den Erfolg.", "tags": []}, {"r": 4, "t": "Man sollte sich vorher einem Podologen vorstellen oder zumindest in Eigeninitiative die Füße vorbehandeln. Zu denken man nimmt Ciclopoli und alle Probleme verwandeln sich in Luft ist schlichtweg falsch", "tags": []}, {"r": 4, "t": "Den Artikel habe ich bereits mehrfach über Amazon bestellt. Er ist ok. Ich weiss nur nicht, warum die Apotheke immer einen viel zu grossen Karton für das kleine Fläschchen benutzt. Wird auf diesem Wege das Altpapier ent- sorgt?", "tags": []}, {"r": 4, "t": "Funktioniert ist aber echt teuer.", "tags": []}, {"r": 4, "t": "Gutes Produkt Kann ich weiter empfehlen Lg.", "tags": []}, {"r": 4, "t": "Dieses (wasserlösliche) Mittel muss jeden Tag aufgetragen werden. Es reicht, die Füße täglich gründlich zu waschen und dann das Mittel aufzutragen. Man muss nicht irgendwelche Reiniger benutzen, um das Mittel vorher zu entfernen. Aber wie bei allen Pilzmitteln muss man mit dem Erfolg Geduld haben. Nachdem ich schon mehrere Mittel ausprobiert habe, scheint dieses am besten zu wirken. Ich denke, dass ich in etwa drei Monaten der Pilz restlos beseitigt ist.", "tags": []}, {"r": 4, "t": "Bereits nach wenigen Tagen Anwendung keine Verfärbung mehr. Funktioniert viel schneller als erwartet.", "tags": []}, {"r": 4, "t": "Gibt bessere Produkte", "tags": []}, {"r": 4, "t": "Ich habe bisher so ziemlich alles probiert was am Markt ist. Angefangen von einer längeren Behandlung beim Hautarzt, bis hin zu monatelangen Anwendungen verschiedener Präparate. Bislang alles ohne Erfolg. Jetzt habe ich Ciclopoli seit ungefähr fünf Wochen und bin von den ersten Auswirkungen angenehm überrascht. Ich möchte aber noch nicht zu früh jubeln. Ein abschließendes Urteil ist einfach verfrüht.", "tags": []}, {"r": 4, "t": "Ich habe einen befallenen Zehennagel und kaufe Ciclopoli seit ca. 2 Jahren. Es hilft meinen Nagel wieder normal aussehen zu lassen. Das einzige was ich negativ finde ist, das der Pinsel zu kurz ist und man so schlecht an die Rückstände gelangt. Ansonsten sehr gut!", "tags": []}, {"r": 4, "t": "Wirkt\\....aber sehr langsam. Nach etwa 2 Jahren ist eine Wirkung erkennbar. Und außerdem ist der Lack überteuert . Für etwa 6ml zahle ich etwa 40,00€ . One person found this helpful", "tags": []}, {"r": 4, "t": "Langsam, aber sicher sehe ich ein Resultat.", "tags": []}, {"r": 4, "t": "die Anwendung ist einfach. die Wirkungsweise wunderbar. man muss nur generell aufpassen, das man den nagel weiterhin richtig schneidet. bei falscher Handhabung kann der neue nagel ins fleisch wachsen und der Arzt muss aufgesucht werden", "tags": []}, {"r": 4, "t": "Anwendung wichtig Reviewed in Germany on 2 April 2018 Im Vergleich zur Apotheken-Wäre doppelte Menge, aber nur 1,5-Fächer Preis. Man muss bei der Anwendung konsequent durchhalten und das Produkt TÄGLICH anwenden, damit ein Erfolg sichrbarbwird. Je nach Stärke des Nagelpilzes Anwendungsdauer auch gerne über ein Jahr.", "tags": []}, {"r": 4, "t": "gut", "tags": []}, {"r": 4, "t": "Hilft recht zeitnah. Wirklich gut.", "tags": []}, {"r": 4, "t": "Super für die Nägel", "tags": []}, {"r": 4, "t": "Dieses Nagelpilzmittel wurde mir empfohlen von meiner Fußpflege. Bisher kann ich sagen, es gibt leichte Besserungen. Nur muss man bei Pilzkrankheiten sehr viel Geduld haben, um zu sagen, dass es geholfen hat. Es wurde schnell und gut verpackt geliefert. Danke.", "tags": []}, {"r": 4, "t": "Artikel entspricht meinen Erwartungen.", "tags": []}, {"r": 4, "t": "Wirkung nur bei längerer Anwendung", "tags": []}, {"r": 4, "t": "sehr einfach die Anwendung mit dem pinsel auftragen und schon fertigt", "tags": []}, {"r": 4, "t": "1\\. schnelle Lieferung, 2\\. nagelpilz geht zurück.", "tags": []}, {"r": 4, "t": "wirkt nach längerem Gebrauch, zu teuer", "tags": []}, {"r": 4, "t": "Teuer aber es wirkt bei konsequenter Anwendung. Nutze es jetzt seit 4 Monaten, Nägel werden langsam gesund. One person found this helpful", "tags": []}, {"r": 4, "t": "Etwas teuer aber passt", "tags": []}, {"r": 4, "t": "Passt", "tags": []}, {"r": 4, "t": "Alles OK", "tags": []}, {"r": 4, "t": "Der Nagelpilz ist deutlich zurückgegangen .", "tags": []}, {"r": 4, "t": "Preis-Leistungsverhältniss", "tags": []}, {"r": 4, "t": "es hat wunderbar geklapt,, danke,", "tags": []}, {"r": 4, "t": "Sehr schnelle Lieferung", "tags": []}, {"r": 4, "t": "Das Angebot , Darstellung , Preis und Lieferzeit sind voll ok. Habe hier schon oft eingekauft , immer guter Service.", "tags": []}, {"r": 4, "t": "Das Mittel hilft, ist für diesen hohen Preis von der Menge her, aber ein ganz schlechter Witz. Da müssten mindestens 12 Ml drin sein !", "tags": []}, {"r": 4, "t": "Mittel Reviewed in Germany on 8 July 2023 Ich schreibe hier, weil alle schreiben,das ciclopoli allein schon hilft. Das ist so aber nicht richtig. Ciclopoli hilft natürlich oberflächlich den Nagelpilz zu entfernen, aber \\\"jeder\\\" Nagelpilz steckt leider an der Nagelwurzel . Und da kommt man nur mit dem Lack eben auch nicht dran. Bedeutet, der Pilz kommt wieder zurück. Nicht sofort, aber er kommt wieder. Definitiv. Es muss vorher mit Harnsäurecreme der Nagel aufgelöst werden ( dauert 14 Tage - schmerzlos), und der Nagel muss jeden Tag dadurch kürzer geschnitten werden ( zur Not Fußpflege) , bedeutet, am Ende der Harnsäure Behandlung ist wenig Nägel da. Und erst nach diesen 14 Tagen kommt ciclopoli zum Einsatz, so ist gewährleistet, das der Lack an die Wurzel kommt. Und du hast dauerhaft den Pilz weg. Es nützt ja nichts ihn nur oberflächlich weg zu bekommen, ein Pilz kann sich dann überall im Körper ausbreiten und das wollt ihr sicher nicht. Die Folgen könnten auch intertrigo sein z.b. optisch es weg zu bekommen ist ja nicht die Lösung . Aber, da stimmen sie die Bewertungen, denn er geht weg, aber eben nicht in der Tiefe . Das berücksichtigt keiner hier", "tags": []}, {"r": 4, "t": "Bevor der Lack aufgtragen wird sollte man regelmäßig mit einer Nagelfeile den befallenen Nagel einwenig abfeilen und mit einem Alkoholtupfer den Nagel und die Feile (aus Metal) reinigen.Nach ca.6 Monaten war der Pilz bei mir an 3 Zehennägel besiegt.Ich habe bei der Behandlung auf die Tapletten die mir der Hautartz empfholen verzichtet wegen den Nebenwirkungen", "tags": []}, {"r": 4, "t": "Über ein Jahr kauf ich das Zeug und erst jetzt wirkt es weil ich durch Zufall herausgefunden habe das man den Nagel vorher Anfeilen muss obwohl man das laut Gebrauchsanleitung nicht braucht. Klar nicht, denn um so mehr kauft man davon und um so mehr wird verdient. Am Anfangt dringt das Serum gut ein da der Nagel Trocken, rissig und spröde ist. Der Nagel wird nach einigen Anwendungen direkt weich und man denkt, wow funktioniert. Dann nach kurzer Zeit regeneriert sich der Nagel und wird wieder Dicht, was bedeutet das das Serum nicht dahin kommt wo es hin soll, unter den Nagel. Wer also VIEL GELD SPAREN will sollte sich mit dem Zeug Einwegfeilen kaufen und den Nagel von allen Seiten regelmäßig anfeilen. Das Zeug funktioniert ich finde es aber schon mega dreist das die wichtigste Info vom Hersteller als unwichtig hingestellt wird. Kostet ja nun keine € 2,50.", "tags": []}, {"r": 4, "t": "Ich habe das noch nicht lange muss aber sagen das das was bringt, aber das dauert auch 6-12 Monate bis der dann weg ist", "tags": []}, {"r": 4, "t": "Ich habe Ciclopoli gegen Nagelpilz für eine Infektion an meinem Zehennagel verwendet. Die Anwendung ist unkompliziert, da der Nagellack einmal täglich aufgetragen werden muss. Ein großer Vorteil ist, dass der Lack in nur 30 Sekunden trocknet, was ihn besonders praktisch im Alltag macht. Die spezielle HPCH-Lacktechnologie sorgt dafür, dass der Wirkstoff tief in den Nagel eindringt und dort gegen den Pilz wirkt. Ich habe den Eindruck, dass sich der Zustand meines Nagels bereits nach einigen Anwendungen verbessert hat. Besonders positiv hervorzuheben ist, dass der Lack unsichtbar auf dem Nagel ist, was für mich diskret und angenehm war. Insgesamt bin ich mit dem Ergebnis zufrieden. Natürlich benötige ich noch Geduld, da Nagelpilzbehandlungen Zeit in Anspruch nehmen. Aber Ciclopoli scheint eine gute Wahl zu sein, besonders wenn man eine einfache und effektive Lösung sucht.", "tags": []}, {"r": 5, "t": "Fußpflege beim Podologen Reviewed in Germany on 5 November 2019 UPDATE 27.11.2020: Nachdem der Podologe wieder und wieder die schadhafte Stelle gefräst hat, um dem Pilz den Garaus zu machen, und ich fleißig weiter gepinselt habe, ist der Pilz jetzt weg. Ich pinsele aber weiter bis die Flasche leer ist. Der Podologe erklärt, dass jetzt der gesunde Nagel einfach ganz herauswachsen muss. Und das dauert ca. 1 Jahr. Geduld ist nach wie vor gefragt. TIPP: Immer sich Unterstützung durch medizinische Fußpflege holen. Nur Pinseln reicht nicht aus. Die schadhaften Stellen müssen weggefräst werden. UPDATE 01.03.2020: Ja, das Produkt ist sehr teuer. Aber ein Preis-/Leistungsvergleich verbietet sich einfach. Entweder man möchte wieder einen gesunden Fußnagel haben oder eben nicht. Ich bin jetzt bei der 2. Flasche angekommen, der alte Nagel ist nahezu komplett weg. Der Pilz nicht mehr sichtbar, aber mein Podologe empfiehlt, weiterhin täglich Ciclopoli zu verwenden, bis der neue Nagel komplett gewachsen ist und sich kein neuer Nagelpilz unter dem neuen Nagel gebildet hat. Sollte das später doch der Fall sein, dann hilft nur Nagelziehen und Tablettenbehandlung. Aber ich bin zuversichtlich, dass jetzt alles ok wird. Ich habe mir wohl im Schwimmbad den Nagelpilz eingefangen. Das ist fast 2 Jahre her. Auf Empfehlung habe ich 2x wöchentlich Amorolfin genommen, aber trotz professioneller Nagelpflege beim Podologen hat das nicht geholfen. Er wollte gerne, dass ich Tabletten einnehme, damit der Nagelpilz von innen heraus entfernt wird. Aber mein Arzt wollte wg. möglicher Probleme mit Leberwerten nichts davon wissen. Sagt der Podologe: Dann würde ich es alternativ mit Ciclopoli versuchen. Gesagt, getan. Nach nur gut 2 Monaten scheine ich das endlich in den Griff zu bekommen. Der Podologe ist auch zufrieden, da er jetzt die schadhaften Stellen wegfräsen kann. Der Nagel sieht jetzt zwar etwas zerklüftet aus, aber die Pilzverfärbungen sind weg. Alles unter dem verbliebenen Nagel sieht gesund aus. Nun muss ich einfach weiterpinseln, bis der Nagel komplett neu gewachsen ist. Das kann noch weitere 6-9 Monate dauern. Ich bin zuversichtlich, dass ich das jetzt im Griff habe.", "tags": []}, {"r": 5, "t": "Bin überzeugt. Ich nehme es schon über 1 Jahr. Erst morgens und abends, jetzt nur noch 3x pro Woche abends. Es scheint den Pilz in Schach zu halten, zumindest ist mein Nagel wieder nachwachsen und mittlerweile fast beseitigt. Nagelpilz ist ein A\\*, die Behandlung langwierig. Die Verfärbung geht noch nicht weg und es waren auch daneben liegende Zehen betroffen. Zeitgleich mache ich eine UV-Lichttherapie. Ciclopoly wurde mir von meinem Hautarzt als das beste Mittel und zuverlässigste Mittel empfohlen", "tags": []}, {"r": 5, "t": "Habe es vom Hausarzt und einer Bekannten empfohlen bekommen. Hatte schon 2 Flaschen a 3ml aufgebraucht in den letzten Wochen, da ich es täglich 1mal abends vorm schlafen gehen anwende zusammen mit 2 anderen Medikamenten wobei eines vom Dermatologen auf Rezept ist und das Andere auch nach Recherche hier gekauft wurde (Terbiderm Spray für den Fuß und TerbiGalen für die innere Anwendung). Stück für Stück wird es besser, so dass sich selbst mein Hautarzt wunderte ( habe ihm natürlich nicht gesagt, dass ich zusätzlich ciclopoli verwende und Terbiderm). Tja, manchmal muss man auch Ärzte vor die Wand rennen lassen, da die nur Chemiekeulen,Kortison etc für innere Anwendung kennen bei sowas. Davon hatte ich genug und bin froh, dass ich eine super Kombi-Lösung gefunden habe und habe mittlerweile den Dermatologen gewechselt und der findet meine Idee super und unterstützt mich bei der Heilung ohne TerbiGalen (Chemiekeule und extrem viele Nebenwirkungen). Mein jetziger Hautarzt empfiehlt sogar ciclopoli seinen Patienten und erklärt alles ganz genau. Ich bin mit ciclopoli rundum glücklich und sehe langsam wie klar mein Nagel wieder nachwächst und der Pilz langsam herauswächst und verschwindet. Bin super zufrieden.", "tags": []}, {"r": 5, "t": "Habe den Nagellack auf Anraten meines Hautarztes gekauft und benutze diesen jetzt schon einige Wochen. Bei mir hilft er sehr gut. Am Anfang wurde es erst mal etwas schlimmer, aber das wurde mir vorher schon mitgeteilt. Zu den schlechten Bewertungen zu diesem und anderen freiverkäuflichen Mitteln. Es gibt sehr viele verschiedene Arten von Nagelpilz und so viele verschiedene Mittel gibt es auch. Man sollte sich nicht irgendein Mittel holen, weil man es hier, in der Apotheke oder im Internet sieht. Jedes Mittel wirkt anders und für einen anderen Nagelpilz. Der Gang zum Arzt bleibt bei Nagelpilz leider nicht aus. Dieser nimmt eine Probe und schaut sich den oder die Nägel richtig an und kann nach der Diagnose das richtige Mittel verschreiben. Oft muss auch geschaut werden, in welchem Stadium sich der Nagelpilz befindet und welches Mittel da das richtige ist. Also nicht einfach irgendwas kaufen und dann schlecht bewerten, weil es bei einem selbst nicht klappt. Nur weil Nagelpilz eine Volkskrankheit ist, kann da nicht nur Google helfen. Schon allein das man auch so in Kauf nimmt, Mitmenschen anzustecken, sich selbst \\\"in Gefahr\\\" bringt, weil man evtl. Nicht richtig behandelt und dadurch der Pilz sich noch weiter vermehren kann. Und man sollte such nicht auf Wunder hoffen. Eine Behandlung gegen Nagelpilz braucht sehr viel Zeit.", "tags": []}, {"r": 5, "t": "Ich habe mir vor ca einem Jahr Gelnägel in einer \\\"Billig - fast-nägel - Kette\\\" machen lassen. Die ersten Male war alles gut, dann hatte ich einen Nagelpilz an den Händen. Scheußlich! Ich habe mir sofort ciclopoli in der Apotheke gekauft. Die Apothekerin erklärte mir, ich müsse Geduld haben, es kann bis zu einem Jahr dauern! Ich war echt geschockt, sooo lange!! Nach ca 3 Monaten war der Pilz für mein Laien Auge nicht mehr zu sehen und habe Nagellack (eigenen) lackiert\\... Da war wohl noch was vom alten Pilz drin, also hatte ich ihn wieder! Sofort hier die große Flasche bestellt. Jetzt sind ca 4 Wochen um, noch ist er nicht ganz weg, aber ich bin sehr zufrieden. Fast täglich sehe ich eine Verbesserung! Man braucht Geduld, und muss das Mittel wirklich jeden Abend anwenden. Und keinen Nagellack dazu benutzen! Auch keinen neuen, da sich darunter der Pilz weiter ausbreitet. Auch die Nagelfeile desinfiziere ich! Ich warte noch ein paar Wochen bis ich wieder normalen Lack verwende. Ciclopoli kann ich.sehr empfehlen! Es hilft und bei richtiger Anwendung ist der Pilz auch irgendwann besiegt. Aber nicht in 3 bis 4 Wochen. Vielleicht in drei bis 4 Monaten.", "tags": []}, {"r": 5, "t": "Ich hatte seit längerer Zeit an den beiden großen und an 2 kleinen Zehen Nagelpilz. Seit 3 Monaten verwende ich Ciclopoli. Die beiden großen Zehen sind mittlerweile zur Hälfte und die anderen fast komplett gesund nachgewachsen. Ich habe das Mittel morgens und abends auf alle Zehnägel aufgetragen, um weiterem Befall vorzubeugen. Dann hält eine 6,6 ml Flasche ca. 1 Monat. Die Haut um die Nägel wird etwas trocken, daher muss man ab und zu Fußcreme benutzen. Ansonsten bin einfach nur begeistert., auch weil die Flüssigkeit sofort einzieht.", "tags": []}, {"r": 5, "t": "Ich habe Jahre lang verschiedene Lacke ausprobiert - ohne wirklichen 100% Erfolg - nach absetzen kam es immer wieder. Jetzt habe ich Ciclopoli in Kombination mit einem Nail Care Pen Health Routine über 10 Monate eingesetzt. Morgens das eine - abends das andere. Und der Nagel ist wieder klar. Für mich bisher das beste Ergebnis", "tags": []}, {"r": 5, "t": "Habe viele sachen gegen nagelpilz versucht: knoblauch, canestansalbe usw\\... aber es wirkt wirklich nur kitonail. Es dauert bis 6 mon bis der neue nagel vollständig nach gewachsen ist, aber bei tägl anwendung ist der erfolg garantiert!👍🏻👍🏻", "tags": []}, {"r": 5, "t": "Das Mittel funktioniert super, man muss aller Dings jeden Tag den Zehennagel mit Wasser reinigen und das Mittel dann dünn aber großflächig auftragen. Man sollte natürlich wissen, dass dieser Prozess ca. 3 Monate dauert, halt, bis der Nagelpilz herausgewachsen ist! Man muss das Mittel also ca. 3x kaufen. So ist es jedenfalls bei mir, habe allerdings einen sehr großen Zeh. Schuhgröße 48", "tags": []}, {"r": 5, "t": "Erst waren wir skeptisch, denn nach der ersten Flasche kaum Besserung. Nach der zweiten sieht man schon deutlich, das es rauswächst. Mittlerweile ist es die dritte Flasche und es sind hervorragende Verbesserungen zu sehen. Manchmal braucht man doch ein wenig Geduld und Ausdauer. Wir können es sehr empfehlen. One person found this helpful", "tags": []}, {"r": 5, "t": "Ich war erst einmal skeptisch, da ich schon so viele Produkte ausprobiert habe und es hat nichts geholfen. Ich benutze das Produkt ununterbrochen seit Dezember und mein Nagelpilz ist fast geheilt. Mann muss nur wirklich dran bleiben. Jeden Abend habe ich ohne Ausnahme an den betroffenen Stellen angewendet und ich bin guter Dinge dass bis zum Sommer alles verschwindet.", "tags": []}, {"r": 5, "t": "Alles gut", "tags": []}, {"r": 5, "t": "Ich hab mir den verdammten Nagelpilz in der Sauna eingefangen. Und Nagelpilz ist sowas von hartnäckig. Ich kannte dieses Mittel bereits von meinem Schwiegervater, dem es wunderbar geholfen hat. Mir wurde dieses Mittel von meinem Hautarzt empfohlen, als ich den Nagelpilz abklären lassen wollte. Es lässt sich sehr sparsam auftragen, trocknet fix und nach dem Auftrag nicht mehr (obwohl der Flascheninhalt schon nach Nagellack riecht). Leider hat das Mittel bei mir nicht gewirkt. Das lag allerdings daran, dass ich mir einen ziemlich fiesen Pilz eingefangen habe, der bei einem Abstich festgestellt wurde. Nun bekomme ich zusätzlich Tabletten. Wenn hier also jemand schreibt \\\" Finger weg, es hilft nicht!\\\" könnte es auch an dem Nagelpilz liegen, den ihr euch eingefangen habt. Von daher rate ich euch: Es muss nicht an Ciclopoli liegen, sondern kann auch an eurem Nagelpilz liegen. Fragt euren Arzt! Nagelpilz dauert lange, bis er wirklich weg ist.", "tags": []}, {"r": 5, "t": "sehr gut", "tags": []}, {"r": 5, "t": "Ich nehme Ciclopoli seit Juni und es hat mir auch schon geholfen. Die Verfärbung beider Nägel ist etwas zurückgegangen, und es sieht auch nicht mehr so schlimm aus. Also hilft es wohl :-)", "tags": []}, {"r": 5, "t": "Schon zum zweiten Mal gekauft, hilft sehr gut. Versandt ging zügig.", "tags": []}, {"r": 5, "t": "Alles super würde wieder Kaufen", "tags": []}, {"r": 5, "t": "Ich hatte das Produkt bereits in einer 3,3 ml-Füllung. Diese Menge reicht jedoch nicht aus, um einen Zehennagel mit Pilzbefall bis zum Auswachsen zu begleiten. Daher kannte ich das Produkt, und habe nur in einer größeren Füllmenge, 6,6 ml, nachbestellt. Der Nagellack scheint gut zu wirken. Er verhindert bisher die erneute Ausbreitung. Bei weiterer regelmäßiger, täglicher, Anwendung gehe ich davon aus, dass die befallenen Teile des Zehennagels in ca. 6 Monaten auswachsen.", "tags": []}, {"r": 5, "t": "Hilft gut", "tags": []}, {"r": 5, "t": "Alles bestens", "tags": []}, {"r": 5, "t": "Habe schon einiges versucht aber bisher ohne Erfolg. Das Zeug hier allerdings funktioniert tatsächlich. Ich hatte zwei Zehnägel die eigentlich schon total vergammelt waren. Nun sieht man ernsthaft neuen Nagel nachwachsen. Aber es braucht Zeit da Nägel langsam wachsen.", "tags": []}, {"r": 5, "t": "Seit 5 Jahren schämte ich mich über meine großen Zehen. Irgendwo mAL eingefangen und nie wieder losgeworden den Fusspilz. Habe alles versucht, von Cremes, bis sprays, bis UV Lampen ALLES! Seit 4 Wochen nutze ich dieses Produkt und es ist das erste, wirklich das Erste was bei mir anschlägt! Die Zehen sehen komplett weiss aus. Der gelbe Schimmer ist so gut wie verschwunden und endlich traue ich mich wieder Barfuß in die Öffentlichkeit\\... Ich werde das Produkt weiter verwenden, bis die Zehen absolut normal aussehen und vermutlich präventiv weiter nutzen, da ich nicht se it.", "tags": []}, {"r": 5, "t": "Top Ware", "tags": []}, {"r": 5, "t": "Man muss das monatelang anwenden, aber es ist sehr sparsam im Gebrauch, und das geht sich aus.", "tags": []}, {"r": 5, "t": "wende es täglich an und sehe schon Erfolge. Der Nagel wächst gesund nach. Es wird eine Weile dauern, aber bei täglicher Anwendung werde ich im Frühjahr wieder einen pilzfreien Nagel haben. Tolles Produkt!", "tags": []}, {"r": 5, "t": "Einfach gut für Nagelpilz", "tags": []}, {"r": 5, "t": "gerne wieder", "tags": []}, {"r": 5, "t": "habe teuerer Mittel gekauft, doch keinen hat richtig geholfen. Dieses Produkt zum zum 3x mal - hilft ausgezeichnet und ist sehr einfach in der Anwendung!!! Immer wieder gerne - sehr zum empfehlen - alles spitze", "tags": []}, {"r": 5, "t": "Habe es getestet und war sehr zufrieden", "tags": []}, {"r": 5, "t": "Alles ausprobiert nur dieses hilft. Würde es jeden empfehlen. Bitte nur jeden Tag benutzen und Geduld", "tags": []}, {"r": 5, "t": "Artikel wie beschrieben. Und sehr schnelle Lieferung.", "tags": []}, {"r": 5, "t": "Habe dieses Produkt auf Empfelung gekauft, vielleicht hilft es.", "tags": []}, {"r": 1, "t": "Ich habe dieses Produkt über ein Jahr wie beschrieben angewendet. Geholfen hat es schliesslich und endlich leider nur dem Verkäufer. Tip: 2 mal täglich mit Essigessenz eintupfen ist nach jahrelangen Mittelchen probieren das Einzige was wirklich geholfen hat.", "tags": []}, {"r": 1, "t": "Ich habe diesen Artikel zwei mal bestellt und ca 3 Monate 2 -3 x täglich verwendet. Leider gab es bei mir absolut keine Veränderung . Ich werde es weiter mit einem anderen Produkt versuchen. Dieses mal aber aus der Apotheke.", "tags": []}, {"r": 1, "t": "Been using this for 6 months every day and done everything they advertised and had no good results from it .. for me it was snake oil", "tags": []}, {"r": 1, "t": "Benutze die Lösung jetzt seit Monaten und der Nagelpilz ist immer noch nicht weg. Ich kann das Produkt leider überhaupt nicht weiterempf
