<template id="tpl-total-market"><!-- Total Market Tab Template -->
<div id="tm-root"></div>

<script>
(function tmInit() {
  var dashData = window._DASH_DATA;
  var root = document.getElementById('tm-root');

  if (!dashData || !dashData._computed) {
    root.innerHTML = '<div class="card"><h3>Total Market</h3><p style="color:#64748b;font-size:.85rem">No X-Ray data loaded. Place an X-Ray CSV in <code>data/x-ray/</code> and configure <code>xray.file</code> in dashboard.json.</p></div>';
    return;
  }

  var C = dashData._computed;
  var h = '';
  var cur = C.currency || '$';
  var segments = C.segments;
  var segNames = segments.map(function(s) { return s.name; });
  var segColors = segments.map(function(s) { return s.color; });
  var segUnits = segments.map(function(s) { return s.units12m; });
  var segRevenue = segments.map(function(s) { return s.revenue12m; });
  var totalUnits = C.totals.totalUnits12m;
  var totalRev = C.totals.totalRevenue12m;
  var totalAsins = C.totals.totalAsins;
  var seasonality = C.seasonality;
  var salesFilesFound = C.salesFilesFound || 0;
  var salesFilesMissing = C.salesFilesMissing || 0;
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var exportMonthName = monthNames[C.exportMonth || 0];

  function fmtMoney(v) {
    if (v >= 1e6) return cur + (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return cur + (v / 1e3).toFixed(0) + 'K';
    return cur + v;
  }

  function fmtUnits(v) {
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return Math.round(v / 1e3) + 'K';
    return v.toLocaleString();
  }

  // ── Title ──
  h += '<h2>Main Segments \u2014 Total Market (12M)</h2>';

  // ── Total Category KPI bar ──
  h += '<div class="card" style="border-left:4px solid #1e293b;padding:14px 20px;display:flex;align-items:center;gap:36px;flex-wrap:wrap;margin-bottom:14px">';
  h += '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748b;min-width:120px">Total Category</div>';
  h += '<div><div style="font-size:1.6rem;font-weight:700;color:#1e293b;line-height:1">' + fmtMoney(totalRev) + '</div>';
  h += '<div style="font-size:.75rem;color:#64748b;margin-top:3px">Revenue \u00b7 12M' + (seasonality ? ' (seasonality-adjusted)' : ' (30d \u00d712)') + '</div></div>';
  h += '<div><div style="font-size:1.6rem;font-weight:700;color:#1e293b;line-height:1">' + totalUnits.toLocaleString() + '</div>';
  h += '<div style="font-size:.75rem;color:#64748b;margin-top:3px">Units Sold \u00b7 12M</div></div>';
  h += '<div><div style="font-size:1.6rem;font-weight:700;color:#1e293b;line-height:1">' + totalAsins + '</div>';
  h += '<div style="font-size:.75rem;color:#64748b;margin-top:3px">ASINs Tracked</div></div>';
  h += '</div>';

  // ── Per-segment KPI cards ──
  var cols = segments.length <= 2 ? '1fr 1fr' : segments.length === 3 ? '1fr 1fr 1fr' : 'repeat(auto-fill,minmax(280px,1fr))';
  h += '<div style="display:grid;grid-template-columns:' + cols + ';gap:14px;margin-bottom:22px">';
  segments.forEach(function(seg) {
    h += '<div class="card" style="border-left:4px solid ' + seg.color + ';padding:14px 16px">';
    h += '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:' + seg.color + ';margin-bottom:10px">' + seg.name + ' <span style="font-weight:400;color:#94a3b8">(' + seg.asins + ' ASINs)</span></div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">';
    h += '<div class="kpi" style="box-shadow:none;background:#f8fafc;padding:8px 10px"><div class="kpi-v" style="font-size:.95rem">' + fmtUnits(seg.units12m) + '</div><div class="kpi-l">Units sold (12M)</div></div>';
    h += '<div class="kpi" style="box-shadow:none;background:#f8fafc;padding:8px 10px"><div class="kpi-v" style="font-size:.95rem">' + fmtMoney(seg.revenue12m) + '</div><div class="kpi-l">Segment Value (12M)</div></div>';
    h += '</div></div>';
  });
  h += '</div>';

  // ── Auto-generated insight box ──
  h += '<div class="insight">' + generateInsight(segments, totalUnits, totalRev, totalAsins, cur) + '</div>';

  function generateInsight(segs, totU, totR, totAsins, c) {
    var n = segs.length;
    var byRev = segs.slice().sort(function(a, b) { return b.revenue12m - a.revenue12m; });
    var byUnits = segs.slice().sort(function(a, b) { return b.units12m - a.units12m; });

    var topRev = byRev[0];
    var topUnits = byUnits[0];
    var topRevShare = (topRev.revenue12m / totR * 100).toFixed(1);
    var topUnitShare = (topUnits.units12m / totU * 100).toFixed(1);

    var parts = [];
    var methodNote = salesFilesFound > 0
      ? salesFilesFound + ' ASINs with actual sales data (seasonality-adjusted), ' + salesFilesMissing + ' projected from X-Ray ' + exportMonthName + ' snapshot.'
      : 'All ASINs projected from X-Ray 30d snapshot (\u00d712).';
    parts.push('<strong>Segment-level view.</strong> ' + totAsins + ' ASINs across ' + n + ' segments. ' + methodNote);

    // Dominant segment
    if (topRev.name === topUnits.name) {
      parts.push(topRev.name + ' dominates both revenue (' + topRevShare + '%) and units (' + topUnitShare + '%).');
    } else {
      parts.push(topRev.name + ' leads revenue (' + topRevShare + '%), while ' + topUnits.name + ' leads units (' + topUnitShare + '%).');
    }

    // Compare top 2 if close
    if (byRev.length >= 2) {
      var r1 = byRev[0].revenue12m / totR * 100;
      var r2 = byRev[1].revenue12m / totR * 100;
      if (r1 - r2 < 5) {
        parts.push(byRev[0].name + ' and ' + byRev[1].name + ' are nearly equal in revenue share (' + r1.toFixed(1) + '% vs ' + r2.toFixed(1) + '%).');
      }
    }

    // Smallest segment
    var smallest = byRev[byRev.length - 1];
    var smallShare = (smallest.revenue12m / totR * 100).toFixed(1);
    if (parseFloat(smallShare) < 5) {
      parts.push(smallest.name + ' is a niche segment (' + smallShare + '% revenue share).');
    }

    // Revenue vs unit share divergence (indicates pricing differences)
    segs.forEach(function(s) {
      var uPct = s.units12m / totU * 100;
      var rPct = s.revenue12m / totR * 100;
      if (rPct - uPct > 10) {
        parts.push(s.name + ' captures ' + rPct.toFixed(1) + '% of revenue with only ' + uPct.toFixed(1) + '% of units \u2014 higher price point.');
      } else if (uPct - rPct > 10) {
        parts.push(s.name + ' has ' + uPct.toFixed(1) + '% of units but only ' + rPct.toFixed(1) + '% of revenue \u2014 lower price point.');
      }
    });

    return parts.join(' ');
  }

  // ── Revenue & Units pies ──
  h += '<div class="g2" style="align-items:start">';
  h += '<div class="card"><h3>Revenue by Segment (12M)</h3><div class="cw" style="height:280px"><canvas id="tmFocusRevPie"></canvas></div>';
  h += '<div class="note">Revenue figures = 12M units \u00d7 listed ASIN price.</div></div>';
  h += '<div class="card"><h3>Units by Segment (12M)</h3><div class="cw" style="height:280px"><canvas id="tmFocusUnitsPie"></canvas></div>';
  h += '<div class="note">Unit volumes by segment (12M).</div></div>';
  h += '</div>';

  // ── Segment Summary table ──
  h += '<div class="card"><h3>Segment Summary (12M)</h3>';
  h += '<div class="tbl-wrap"><table class="num-right" id="tmSegTable">';
  h += '<thead><tr><th style="text-align:left">Segment</th><th>Units (12M)</th><th>Revenue (12M)</th><th>Unit Share</th><th>Rev Share</th></tr></thead>';
  h += '<tbody>';
  segments.forEach(function(seg) {
    var uShare = (seg.units12m / totalUnits * 100).toFixed(1);
    var rShare = (seg.revenue12m / totalRev * 100).toFixed(1);
    h += '<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + seg.color + ';margin-right:6px"></span>' + seg.name + '</td>';
    h += '<td data-val="' + seg.units12m + '">' + seg.units12m.toLocaleString() + '</td>';
    h += '<td data-val="' + seg.revenue12m + '">' + cur + seg.revenue12m.toLocaleString() + '</td>';
    h += '<td data-val="' + uShare + '">' + uShare + '%</td>';
    h += '<td data-val="' + rShare + '">' + rShare + '%</td></tr>';
  });
  h += '</tbody></table></div>';
  h += '<div class="note">Revenue = 12M units \u00d7 listed ASIN price.</div></div>';

  // ── Brand Share by Segment — Units ──
  var brandsBySegment = C.brandsBySegment || {};
  h += '<div class="g2" style="align-items:start;margin-top:18px">';
  segments.forEach(function(seg) {
    var bd = brandsBySegment[seg.name];
    if (!bd || bd.length === 0) return;
    h += '<div class="card"><h3>Brand Share \u2014 ' + seg.name + ' (Units, 12M)</h3>';
    h += '<div class="cw" style="height:340px"><canvas id="tmBrand' + seg.name.replace(/\s/g,'') + 'UnitPie"></canvas></div>';
    h += '<div class="note">' + seg.name + ' segment. ' + seg.units12m.toLocaleString() + ' total units (12M). ' + seg.asins + ' ASINs.</div></div>';
  });
  h += '</div>';

  // ── Brand Share by Segment — Revenue ──
  h += '<div class="g2" style="align-items:start">';
  segments.forEach(function(seg) {
    var bd = brandsBySegment[seg.name];
    if (!bd || bd.length === 0) return;
    h += '<div class="card"><h3>Brand Share \u2014 ' + seg.name + ' (Revenue, 12M)</h3>';
    h += '<div class="cw" style="height:340px"><canvas id="tmBrand' + seg.name.replace(/\s/g,'') + 'RevPie"></canvas></div>';
    h += '<div class="note">' + seg.name + ' segment. ' + fmtMoney(seg.revenue12m) + ' total revenue (12M). ' + seg.asins + ' ASINs.</div></div>';
  });
  h += '</div>';

  // ── Segment × Marketplace heatmap (revenue + units, 12M) ──
  // Skipped when only one marketplace is present (single-market dashboards).
  var heatProducts = (C.products || []).filter(function(p) { return p.marketplace; });
  var uniqueMarkets = {};
  heatProducts.forEach(function(p) { uniqueMarkets[p.marketplace] = true; });
  if (heatProducts.length > 0 && Object.keys(uniqueMarkets).length > 1) {
    var marketSet = {};
    heatProducts.forEach(function(p) { marketSet[p.marketplace] = (marketSet[p.marketplace] || 0) + p.revenue12m; });
    var markets = Object.keys(marketSet).sort(function(a, b) { return marketSet[b] - marketSet[a]; });

    function buildPivot(metric) {
      var grid = {};
      var colTotals = {}; var rowTotals = {}; var grandTotal = 0;
      segments.forEach(function(seg) { grid[seg.name] = {}; rowTotals[seg.name] = 0; });
      markets.forEach(function(m) { colTotals[m] = 0; });
      heatProducts.forEach(function(p) {
        var seg = p.type || 'Other';
        if (!grid[seg]) { grid[seg] = {}; rowTotals[seg] = 0; }
        grid[seg][p.marketplace] = (grid[seg][p.marketplace] || 0) + p[metric];
        rowTotals[seg] += p[metric];
        colTotals[p.marketplace] += p[metric];
        grandTotal += p[metric];
      });
      return { grid: grid, rowTotals: rowTotals, colTotals: colTotals, grandTotal: grandTotal };
    }

    function maxCellValue(pivot) {
      var max = 0;
      Object.keys(pivot.grid).forEach(function(seg) {
        markets.forEach(function(m) {
          var v = pivot.grid[seg][m] || 0;
          if (v > max) max = v;
        });
      });
      return max;
    }

    function heatColor(v, max) {
      if (!v || max === 0) return '#ffffff';
      var ratio = v / max;
      if (ratio >= 0.8) return '#1e40af';
      if (ratio >= 0.6) return '#3b82f6';
      if (ratio >= 0.4) return '#93c5fd';
      if (ratio >= 0.2) return '#dbeafe';
      return '#eff6ff';
    }
    function heatTextColor(v, max) {
      if (!v || max === 0) return '#cbd5e1';
      return (v / max) >= 0.6 ? '#fff' : '#1e293b';
    }

    function renderHeatTable(title, fmt, metric) {
      var pivot = buildPivot(metric);
      var max = maxCellValue(pivot);
      var s = '<div class="card" style="margin-top:18px"><h3>' + title + '</h3>';
      s += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem">';
      s += '<thead><tr><th style="text-align:left;padding:8px 12px;background:#f8fafc;font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e2e8f0">Segment</th>';
      markets.forEach(function(m) {
        s += '<th style="text-align:right;padding:8px 12px;background:#f8fafc;font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e2e8f0">' + m + '</th>';
      });
      s += '<th style="text-align:right;padding:8px 12px;background:#f8fafc;font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e2e8f0">Total</th>';
      s += '</tr></thead><tbody>';
      var sortedSegs = Object.keys(pivot.rowTotals).sort(function(a, b) { return pivot.rowTotals[b] - pivot.rowTotals[a]; });
      sortedSegs.forEach(function(segName) {
        s += '<tr><td style="text-align:left;padding:8px 12px;font-weight:600;color:#1e293b;border-bottom:1px solid #f1f5f9">' + segName + '</td>';
        markets.forEach(function(m) {
          var v = pivot.grid[segName][m] || 0;
          var bg = heatColor(v, max);
          var fg = heatTextColor(v, max);
          s += '<td style="text-align:right;padding:8px 12px;background:' + bg + ';color:' + fg + ';font-weight:600;border-bottom:1px solid #f1f5f9">' + (v > 0 ? fmt(v) : '<span style="color:#cbd5e1">—</span>') + '</td>';
        });
        s += '<td style="text-align:right;padding:8px 12px;font-weight:700;color:#0f172a;border-bottom:1px solid #f1f5f9;background:#f8fafc">' + fmt(pivot.rowTotals[segName]) + '</td>';
        s += '</tr>';
      });
      s += '<tr style="background:#f8fafc"><td style="text-align:left;padding:10px 12px;font-weight:700;color:#0f172a;border-top:2px solid #e2e8f0">Total</td>';
      markets.forEach(function(m) {
        s += '<td style="text-align:right;padding:10px 12px;font-weight:700;color:#0f172a;border-top:2px solid #e2e8f0">' + fmt(pivot.colTotals[m]) + '</td>';
      });
      s += '<td style="text-align:right;padding:10px 12px;font-weight:700;color:#0f172a;border-top:2px solid #e2e8f0">' + fmt(pivot.grandTotal) + '</td>';
      s += '</tr></tbody></table></div></div>';
      return s;
    }

    h += renderHeatTable('Revenue by Segment & Marketplace \u2014 12M', fmtMoney, 'revenue12m');
    h += renderHeatTable('Units by Segment & Marketplace \u2014 12M', function(v) { return fmtUnits(v); }, 'units12m');
  }

  // ── Seasonality chart ──
  if (seasonality && seasonality.orderedIndices) {
    h += '<div class="card" style="margin-top:18px"><h3>Monthly Seasonality Index (1.0 = average month)</h3>';
    h += '<div class="cw" style="height:260px"><canvas id="tmSeasIdxChart"></canvas></div>';
    h += '<div class="note">Built from ' + salesFilesFound + ' ASINs with full daily sales history. Months ordered from export month (' + exportMonthName + '). Index above 1.0 = above-average month, below 1.0 = below-average. Used to project 12M units for ASINs without sales history (baseline = 30d ÷ export-month index, then × sum of all 12 indices).</div></div>';
  }

  // ── Methodology note (auto-generated) ──
  h += '<div class="note" style="margin-top:18px">';
  h += '<strong>Data source:</strong> Helium 10 X-Ray (30-day snapshot, ' + exportMonthName + ') + per-ASIN daily sales CSVs. ';
  if (salesFilesFound > 0) {
    h += '<strong>Methodology:</strong> ' + salesFilesFound + ' ASINs with sales history \u2014 12M units summed from actual daily data. ';
    if (salesFilesMissing > 0) {
      h += salesFilesMissing + ' ASINs without sales files \u2014 projected using category seasonality index (derived from ASINs with data). ';
    }
  } else {
    h += '<strong>Methodology:</strong> 30-day X-Ray \u00d712 flat projection (no sales data available). ';
  }
  h += 'Revenue = 12M units \u00d7 listed ASIN price. ';
  h += totalAsins + ' ASINs across ' + segments.length + ' segments (' + segNames.join(', ') + ').';
  h += '</div>';

  root.innerHTML = h;

  // ═══ CHART RENDERING ═══
  Chart.register(ChartDataLabels);

  var PALETTE = ['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#ea580c','#059669','#e11d48','#8b5cf6','#94a3b8'];

  function makePie(id, labels, data, colors, fmtLeg, fmtTip) {
    var el = document.getElementById(id);
    if (!el) return;
    var total = data.reduce(function(a, b) { return a + b; }, 0);
    new Chart(el, {
      type: 'doughnut',
      data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        maintainAspectRatio: false, cutout: '48%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              font: { size: 10.5 }, padding: 7, boxWidth: 11, boxHeight: 11,
              generateLabels: function(chart) {
                return chart.data.labels.map(function(label, i) {
                  var val = chart.data.datasets[0].data[i];
                  var pct = (val / total * 100).toFixed(1);
                  return { text: label + '  ' + (fmtLeg ? fmtLeg(val) : pct + '%'), fillStyle: colors[i], strokeStyle: colors[i], lineWidth: 0, index: i, hidden: false };
                });
              }
            }
          },
          tooltip: { callbacks: { label: function(ctx) { var pct = (ctx.parsed / total * 100).toFixed(1); return fmtTip ? ' ' + fmtTip(ctx.parsed) + ' (' + pct + '%)' : ' ' + pct + '%'; } } },
          datalabels: {
            display: function(ctx) { return (ctx.dataset.data[ctx.dataIndex] / total * 100) >= 5; },
            formatter: function(v) { return (v / total * 100).toFixed(1) + '%'; },
            color: '#fff', font: { size: 10.5, weight: '700' }
          }
        }
      }
    });
  }

  // Segment pies
  makePie('tmFocusRevPie', segNames, segRevenue, segColors,
    function(v) { return fmtMoney(v); }, function(v) { return cur + v.toLocaleString(); });
  makePie('tmFocusUnitsPie', segNames, segUnits, segColors,
    function(v) { return v.toLocaleString(); }, function(v) { return v.toLocaleString() + ' units'; });

  // Brand pies per segment (from computed data)
  segments.forEach(function(seg) {
    var bd = brandsBySegment[seg.name];
    if (!bd || bd.length === 0) return;
    var bLabels = bd.map(function(b) { return b.name; });
    var bColors = bd.map(function(_, i) { return PALETTE[i % PALETTE.length]; });

    makePie('tmBrand' + seg.name.replace(/\s/g,'') + 'UnitPie', bLabels,
      bd.map(function(b) { return b.units; }), bColors,
      function(v) { return v.toLocaleString(); }, function(v) { return v.toLocaleString() + ' units'; });

    makePie('tmBrand' + seg.name.replace(/\s/g,'') + 'RevPie', bLabels,
      bd.map(function(b) { return b.rev; }), bColors,
      function(v) { return fmtMoney(v); }, function(v) { return cur + v.toLocaleString(); });
  });

  // Seasonality bar chart
  if (seasonality && seasonality.orderedIndices) {
    var seasEl = document.getElementById('tmSeasIdxChart');
    if (seasEl) {
      var seasColors = seasonality.orderedIndices.map(function(v) {
        return v >= 1.15 ? '#16a34a' : v >= 0.95 ? '#3b82f6' : v >= 0.75 ? '#f59e0b' : '#dc2626';
      });
      new Chart(seasEl, {
        type: 'bar',
        data: {
          labels: seasonality.orderedMonths,
          datasets: [{
            data: seasonality.orderedIndices.map(function(v) { return Math.round(v * 100) / 100; }),
            backgroundColor: seasColors,
            borderRadius: 4,
            borderSkipped: false,
          }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function(ctx) { return 'Index: ' + ctx.parsed.y.toFixed(2); } } },
            datalabels: {
              anchor: 'end', align: 'end',
              formatter: function(v) { return v.toFixed(2); },
              font: { size: 10, weight: '600' }, color: '#1e293b'
            }
          },
          layout: { padding: { top: 18 } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 } } },
            y: {
              beginAtZero: true,
              grid: { color: '#e2e8f0' },
              ticks: { stepSize: 0.25, font: { size: 10 } },
              title: { display: true, text: 'Seasonality Index', font: { size: 11 } }
            }
          }
        }
      });
    }
  }

  // Make all tables sortable
  DataEngine.makeAllTablesSortable(root);
})();
</script>
</template>
<template id="tpl-market-structure"><!-- Market Structure Tab Template -->
<div id="ms-root"></div>

<script>
(function msInit() {
  var dashData = window._DASH_DATA;
  var root = document.getElementById('ms-root');

  if (!dashData || !dashData._computed || !dashData._computed.segments) {
    root.innerHTML = '<div class="card"><h3>Market Structure</h3><p style="color:#64748b;font-size:.85rem">No X-Ray data loaded.</p></div>';
    return;
  }

  var C = dashData._computed;
  var cur = C.currency || '$';
  var segments = C.segments;
  var PALETTE = DataEngine.SEGMENT_PALETTE;
  var BRAND_PALETTE = ['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#ea580c','#059669','#e11d48','#8b5cf6','#94a3b8'];

  Chart.register(ChartDataLabels);

  // ── Build segment sub-tab selector ──
  var h = '<h2>Market Structure (12M)</h2>';

  h += '<div class="seg-tab-btns" id="msSegBtns">';
  segments.forEach(function(seg, i) {
    h += '<button class="seg-tab-btn' + (i === 0 ? ' active' : '') + '" data-seg="' + i + '" style="border-color:' + seg.color + '">' + seg.name + ' <span style="font-weight:400;color:#94a3b8">(' + seg.asins + ')</span></button>';
  });
  h += '</div>';

  // ── One panel per segment ──
  segments.forEach(function(seg, si) {
    var pid = 'ms-seg-' + si;
    h += '<div id="' + pid + '" class="ms-seg-panel" style="' + (si > 0 ? 'display:none' : '') + '">';
    h += buildSegmentPanel(seg, si);
    h += '</div>';
  });

  root.innerHTML = h;

  // ── Wire segment sub-tab switching ──
  var btns = root.querySelectorAll('.seg-tab-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(btn.dataset.seg);
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      root.querySelectorAll('.ms-seg-panel').forEach(function(p, i) {
        p.style.display = i === idx ? 'block' : 'none';
      });
      // Resize charts in newly visible panel
      Object.values(Chart.instances).forEach(function(c) { c.resize(); });
    });
  });

  // ── Render charts for first (visible) segment ──
  renderSegmentCharts(segments[0], 0);

  // Make all tables sortable
  DataEngine.makeAllTablesSortable(root);

  // Lazy-render charts for other segments on first switch
  var renderedSegs = { 0: true };
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(btn.dataset.seg);
      if (!renderedSegs[idx]) {
        renderSegmentCharts(segments[idx], idx);
        // Make tables in newly rendered segment sortable
        var panel = document.getElementById('ms-seg-' + idx);
        if (panel) DataEngine.makeAllTablesSortable(panel);
        renderedSegs[idx] = true;
      }
    });
  });

  // ══════════════════════════════════════════════════════════════════════════
  // BUILD SEGMENT PANEL HTML
  // ══════════════════════════════════════════════════════════════════════════
  function buildSegmentPanel(seg, si) {
    var products = seg.products;
    var totalSegRev = seg.revenue12m;
    var totalSegUnits = seg.units12m;
    var prefix = 'ms' + si;
    var s = '';

    // ── Concentration KPIs ──
    var sorted = products.slice().sort(function(a, b) { return b.revenue12m - a.revenue12m; });
    var top1Share = sorted.length > 0 ? (sorted[0].revenue12m / totalSegRev * 100) : 0;
    var top3Rev = sorted.slice(0, 3).reduce(function(a, p) { return a + p.revenue12m; }, 0);
    var top5Rev = sorted.slice(0, 5).reduce(function(a, p) { return a + p.revenue12m; }, 0);
    var top10Rev = sorted.slice(0, 10).reduce(function(a, p) { return a + p.revenue12m; }, 0);

    // Top brand
    var brandMap = {};
    products.forEach(function(p) {
      brandMap[p.brand] = (brandMap[p.brand] || 0) + p.revenue12m;
    });
    var topBrand = Object.keys(brandMap).sort(function(a, b) { return brandMap[b] - brandMap[a]; })[0] || '';
    var topBrandShare = topBrand ? (brandMap[topBrand] / totalSegRev * 100) : 0;

    s += '<div class="kpis" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">';
    s += '<div class="kpi"><div class="kpi-v">' + top1Share.toFixed(1) + '%</div><div class="kpi-l">Top 1 ASIN Revenue Share</div></div>';
    s += '<div class="kpi"><div class="kpi-v">' + (top3Rev / totalSegRev * 100).toFixed(1) + '%</div><div class="kpi-l">Top 3 ASINs Share</div></div>';
    s += '<div class="kpi"><div class="kpi-v">' + (top5Rev / totalSegRev * 100).toFixed(1) + '%</div><div class="kpi-l">Top 5 ASINs Share</div></div>';
    s += '<div class="kpi"><div class="kpi-v">' + (top10Rev / totalSegRev * 100).toFixed(1) + '%</div><div class="kpi-l">Top 10 ASINs Share</div></div>';
    s += '<div class="kpi"><div class="kpi-v">' + topBrandShare.toFixed(1) + '%</div><div class="kpi-l">Top Brand (' + topBrand + ')</div></div>';
    s += '</div>';

    // ── Auto-generated insight ──
    var hhi = 0;
    products.forEach(function(p) {
      var share = p.revenue12m / totalSegRev;
      hhi += share * share;
    });
    hhi = Math.round(hhi * 10000);
    var concentration = hhi > 2500 ? 'Highly concentrated' : hhi > 1500 ? 'Moderately concentrated' : 'Competitive / fragmented';
    s += '<div class="insight">';
    s += '<strong>' + seg.name + ' segment:</strong> ' + seg.asins + ' ASINs, ' + DataEngine.fmtMoney(totalSegRev, cur) + ' revenue (12M). ';
    s += concentration + ' market (HHI: ' + hhi.toLocaleString() + '). ';
    s += 'Top brand: ' + topBrand + ' (' + topBrandShare.toFixed(1) + '% revenue share). ';
    s += 'Top ASIN captures ' + top1Share.toFixed(1) + '% of segment revenue.';
    s += '</div>';

    // ── Brand pies (units + revenue) ──
    s += '<div class="g2" style="align-items:start">';
    s += '<div class="card"><h3>Brand Share \u2014 Units (12M)</h3><div class="cw" style="height:340px"><canvas id="' + prefix + 'BrandUnitPie"></canvas></div></div>';
    s += '<div class="card"><h3>Brand Share \u2014 Revenue (12M)</h3><div class="cw" style="height:340px"><canvas id="' + prefix + 'BrandRevPie"></canvas></div></div>';
    s += '</div>';

    // ── Price vs Revenue scatter ──
    s += '<div class="card"><h3>Price vs Revenue (12M) \u2014 ' + seg.name + '</h3>';
    s += '<div class="cw" style="height:320px"><canvas id="' + prefix + 'PriceScatter"></canvas></div>';
    s += '<div class="note">Bubble size = 12M units. X = listed price. Y = 12M revenue.</div></div>';

    // ── Brand Summary table ──
    s += '<div class="card"><h3>Brand Summary \u2014 ' + seg.name + ' (12M)</h3>';
    s += '<div class="tbl-wrap"><table class="num-right" id="' + prefix + 'BrandTable">';
    s += '<thead><tr><th style="text-align:left">Brand</th><th>Rev (12M)</th><th>Share</th><th>Units (12M)</th><th>ASINs</th><th>Avg Price</th><th>Avg Rating</th><th>Total Reviews</th></tr></thead>';
    s += '<tbody>';

    var brands = DataEngine.aggregateByBrand(products);
    brands.forEach(function(b) {
      var bProducts = products.filter(function(p) { return p.brand === b.name; });
      var avgPrice = bProducts.length > 0 ? bProducts.reduce(function(a, p) { return a + p.price; }, 0) / bProducts.length : 0;
      var avgRating = bProducts.length > 0 ? bProducts.reduce(function(a, p) { return a + p.rating; }, 0) / bProducts.length : 0;
      var totalReviews = bProducts.reduce(function(a, p) { return a + p.reviewCount; }, 0);
      var share = totalSegRev > 0 ? (b.rev / totalSegRev * 100).toFixed(1) : '0.0';

      s += '<tr>';
      s += '<td>' + b.name + '</td>';
      s += '<td data-val="' + b.rev + '">' + DataEngine.fmtMoney(b.rev, cur) + '</td>';
      s += '<td data-val="' + share + '">' + share + '%</td>';
      s += '<td data-val="' + b.units + '">' + b.units.toLocaleString() + '</td>';
      s += '<td data-val="' + b.asins + '">' + b.asins + '</td>';
      s += '<td data-val="' + avgPrice.toFixed(2) + '">' + cur + avgPrice.toFixed(2) + '</td>';
      s += '<td data-val="' + avgRating.toFixed(2) + '">' + avgRating.toFixed(1) + '</td>';
      s += '<td data-val="' + totalReviews + '">' + totalReviews.toLocaleString() + '</td>';
      s += '</tr>';
    });
    s += '</tbody></table></div></div>';

    // ── Top ASINs table ──
    s += '<div class="card"><h3>Top ASINs \u2014 ' + seg.name + ' by Revenue (12M)</h3>';
    s += '<div class="tbl-wrap"><table class="num-right" id="' + prefix + 'AsinTable">';
    s += '<thead><tr><th style="text-align:left">ASIN</th><th style="text-align:left">Brand</th><th style="text-align:left">Title</th><th>Price</th><th>Units (12M)</th><th>Revenue (12M)</th><th>Rev Share</th><th>Rating</th><th>Reviews</th></tr></thead>';
    s += '<tbody>';

    var top20 = sorted.slice(0, 20);
    top20.forEach(function(p) {
      var share = totalSegRev > 0 ? (p.revenue12m / totalSegRev * 100).toFixed(1) : '0.0';
      var shortTitle = p.title.length > 60 ? p.title.substring(0, 57) + '...' : p.title;
      s += '<tr>';
      s += '<td><a href="https://www.amazon.com/dp/' + p.asin + '" target="_blank">' + p.asin + '</a></td>';
      s += '<td>' + p.brand + '</td>';
      s += '<td style="max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left" title="' + p.title.replace(/"/g, '&quot;') + '">' + shortTitle + '</td>';
      s += '<td data-val="' + p.price + '">' + cur + p.price.toFixed(2) + '</td>';
      s += '<td data-val="' + p.units12m + '">' + p.units12m.toLocaleString() + '</td>';
      s += '<td data-val="' + p.revenue12m + '">' + DataEngine.fmtMoney(p.revenue12m, cur) + '</td>';
      s += '<td data-val="' + share + '">' + share + '%</td>';
      s += '<td data-val="' + p.rating + '">' + p.rating.toFixed(1) + '</td>';
      s += '<td data-val="' + p.reviewCount + '">' + p.reviewCount.toLocaleString() + '</td>';
      s += '</tr>';
    });
    s += '</tbody></table></div>';
    s += '<div class="note">' + seg.name + ' segment \u2014 top ' + Math.min(20, sorted.length) + ' of ' + seg.asins + ' ASINs by 12M revenue. Revenue = 12M units \u00d7 listed price.</div>';
    s += '</div>';

    return s;
  }

  // ══════════════════════════════════════════════════════════════════════════
  // RENDER CHARTS FOR A SEGMENT
  // ══════════════════════════════════════════════════════════════════════════
  function renderSegmentCharts(seg, si) {
    var prefix = 'ms' + si;
    var products = seg.products;
    var totalSegRev = seg.revenue12m;
    var totalSegUnits = seg.units12m;

    // ── Brand pies ──
    var brands = DataEngine.topBrandsWithOther(DataEngine.aggregateByBrand(products), 8);
    var bLabels = brands.map(function(b) { return b.name; });
    var bColors = brands.map(function(_, i) { return BRAND_PALETTE[i % BRAND_PALETTE.length]; });

    makePie(prefix + 'BrandUnitPie', bLabels,
      brands.map(function(b) { return b.units; }), bColors,
      function(v) { return v.toLocaleString(); }, function(v) { return v.toLocaleString() + ' units'; });

    makePie(prefix + 'BrandRevPie', bLabels,
      brands.map(function(b) { return b.rev; }), bColors,
      function(v) { return DataEngine.fmtMoney(v, cur); }, function(v) { return cur + v.toLocaleString(); });

    // ── Price vs Revenue scatter ──
    var scatterEl = document.getElementById(prefix + 'PriceScatter');
    if (scatterEl) {
      var scatterData = products.map(function(p) {
        return { x: p.price, y: p.revenue12m, r: Math.max(3, Math.min(25, Math.sqrt(p.units12m / 500))), label: p.brand };
      });

      // Group by brand for coloring
      var brandGroups = {};
      products.forEach(function(p, i) {
        if (!brandGroups[p.brand]) brandGroups[p.brand] = [];
        brandGroups[p.brand].push(scatterData[i]);
      });

      var datasets = Object.keys(brandGroups).slice(0, 10).map(function(brand, i) {
        return {
          label: brand,
          data: brandGroups[brand],
          backgroundColor: BRAND_PALETTE[i % BRAND_PALETTE.length] + '99',
          borderColor: BRAND_PALETTE[i % BRAND_PALETTE.length]
        };
      });

      new Chart(scatterEl, {
        type: 'bubble',
        data: { datasets: datasets },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 8, boxWidth: 10 } },
            datalabels: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var d = ctx.raw;
                  return d.label + ': ' + cur + d.x.toFixed(2) + ' price, ' + DataEngine.fmtMoney(d.y, cur) + ' rev';
                }
              }
            }
          },
          scales: {
            x: { title: { display: true, text: 'Price (' + cur + ')' }, grid: { color: '#f1f5f9' } },
            y: { title: { display: true, text: 'Revenue (12M)' }, ticks: { callback: function(v) { return DataEngine.fmtMoney(v, cur); } }, grid: { color: '#f1f5f9' } }
          }
        }
      });
    }
  }

  // ── Shared pie helper ──
  function makePie(id, labels, data, colors, fmtLeg, fmtTip) {
    var el = document.getElementById(id);
    if (!el) return;
    var total = data.reduce(function(a, b) { return a + b; }, 0);
    new Chart(el, {
      type: 'doughnut',
      data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        maintainAspectRatio: false, cutout: '48%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              font: { size: 10.5 }, padding: 7, boxWidth: 11, boxHeight: 11,
              generateLabels: function(chart) {
                return chart.data.labels.map(function(label, i) {
                  var val = chart.data.datasets[0].data[i];
                  var pct = (val / total * 100).toFixed(1);
                  return { text: label + '  ' + (fmtLeg ? fmtLeg(val) : pct + '%'), fillStyle: colors[i], strokeStyle: colors[i], lineWidth: 0, index: i, hidden: false };
                });
              }
            }
          },
          tooltip: { callbacks: { label: function(ctx) { var pct = (ctx.parsed / total * 100).toFixed(1); return fmtTip ? ' ' + fmtTip(ctx.parsed) + ' (' + pct + '%)' : ' ' + pct + '%'; } } },
          datalabels: {
            display: function(ctx) { return (ctx.dataset.data[ctx.dataIndex] / total * 100) >= 5; },
            formatter: function(v) { return (v / total * 100).toFixed(1) + '%'; },
            color: '#fff', font: { size: 10.5, weight: '700' }
          }
        }
      }
    });
  }

})();
</script>

  var reviews = D.reviews || [];

  function vocFilter() {
    var rating = document.getElementById('vocFilterRating').value;
    var theme = document.getElementById('vocFilterTheme').value;
    var search = (document.getElementById('vocFilterSearch').value || '').toLowerCase();
    var filtered = reviews.filter(function(r) {
      if (rating && r.r != rating) return false;
      if (theme && r.tags.indexOf(theme) === -1) return false;
      if (search && r.t.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
    document.getElementById('vocResultCount').textContent = 'Showing ' + filtered.length + ' of ' + reviews.length + ' reviews';
    var html = '';
    var limit = Math.min(filtered.length, 200);
    for (var i = 0; i < limit; i++) {
      var r = filtered[i];
      var starHtml = '<span style="color:' + STAR_COLORS[r.r] + ';font-weight:700">' + r.r + '\u2605</span>';
      var tagsHtml = (r.tags || []).map(function(t) {
        return '<span class="pill ' + ((D.tagStyles && D.tagStyles[t]) || 'pill-blue') + '">' + t.replace(/_/g, ' ') + '</span>';
      }).join('');
      html += '<tr><td>' + starHtml + '</td><td><div class="review-text">' + r.t.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
        (tagsHtml ? '<div style="margin-top:4px">' + tagsHtml + '</div>' : '') + '</td></tr>';
    }
    if (filtered.length > 200) html += '<tr><td colspan="2" style="text-align:center;color:#64748b;font-size:.72rem;padding:12px">Showing first 200 of ' + filtered.length + '. Use filters to narrow.</td></tr>';
    document.getElementById('vocReviewBody').innerHTML = html;
  }

  document.getElementById('vocFilterRating').addEventListener('change', vocFilter);
  document.getElementById('vocFilterTheme').addEventListener('change', vocFilter);
  document.getElementById('vocFilterSearch').addEventListener('input', vocFilter);
  document.getElementById('vocClearBtn').addEventListener('click', function() {
    document.getElementById('vocFilterRating').value = '';
    document.getElementById('vocFilterTheme').value = '';
    document.getElementById('vocFilterSearch').value = '';
    vocFilter();
  });

  vocFilter();

  // Make tables sortable
  DataEngine.makeAllTablesSortable(root);
})();
</script>

<script>
(function bootstrap() {
  var B = window.__BUNDLE_DATA__;
  var segments = DataEngine.aggregateSegments(B.products);
  segments = DataEngine.assignSegmentColors(segments);
  var totals = DataEngine.computeTotals(segments);
  var brandsBySegment = {};
  segments.forEach(function(seg) {
    var brands = DataEngine.aggregateByBrand(seg.products);
    brandsBySegment[seg.name] = DataEngine.topBrandsWithOther(brands, 8);
  });
  window._DASH_DATA = {
    title: B.title, subtitle: B.subtitle, currency: B.currency,
    baseTabs: { reviews: B.reviews },
    addonTabs: { 'marketing-deep-dive': B.mdd },
    _computed: {
      products: B.products, segments: segments, totals: totals,
      brandsBySegment: brandsBySegment, seasonality: B.seasonality,
      salesFilesFound: B.salesFilesFound, salesFilesMissing: B.salesFilesMissing,
      exportMonth: B.exportMonth, currency: B.currency,
    }
  };
  document.getElementById('hdrTitle').textContent = B.title;
  document.getElementById('hdrSub').textContent = B.subtitle;
  var tabs = [
    { id: 'total-market', label: '1 — Total Market' },
    { id: 'market-structure', label: '2 — Market Structure' },
    { id: 'reviews', label: '3 — Reviews VOC' },
    { id: 'marketing-deep-dive', label: '4 — Marketing Deep-Dive' },
  ];
  var bar = document.getElementById('tabBar');
  bar.innerHTML = tabs.map(function(t, i) {
    return '<button class="tab' + (i === 0 ? ' active' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
  }).join('');
  var loaded = {};
  function loadTab(id) {
    if (loaded[id]) return;
    var panel = document.getElementById('dt-' + id);
    var tpl = document.getElementById('tpl-' + id);
    panel.innerHTML = tpl.innerHTML;
    if (id === 'reviews') window._TAB_DATA = window._DASH_DATA.baseTabs.reviews;
    else if (id === 'marketing-deep-dive') window._TAB_DATA = window._DASH_DATA.addonTabs['marketing-deep-dive'];
    else window._TAB_DATA = null;
    panel.querySelectorAll('script').forEach(function(oldScript) {
      var s = document.createElement('script');
      s.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(s, oldScript);
    });
    loaded[id] = true;
  }
  function showTab(id) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === id); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.toggle('active', p.id === 'dt-' + id); });
    loadTab(id);
    if (window.Chart) Object.values(Chart.instances).forEach(function(c) { c.resize(); });
  }
  bar.querySelectorAll('.tab').forEach(function(btn) {
    btn.addEventListener('click', function() { showTab(btn.dataset.tab); });
  });
  showTab('total-market');
})();
