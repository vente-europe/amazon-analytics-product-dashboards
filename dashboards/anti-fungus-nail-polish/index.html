, {"r": 4, "t": "What\\'s this? ) Es ist zwar ein bisschen peinlich, das zuzugeben: Aber ich habe seit ungefähr 20 Jahren einen Fußpilz, der sehr an mir hängt. Eingefangen habe ich ihn mir in einer Budapester Sauna - ein vielleicht ungewöhnlich zähes Exemplar? Ich kann also nur sagen: Wanderer, kommst du nach Bu\\... so achte darauf, was da in den wahrlich schönen Bädern eventuell an Fußpilzen herumliegen könnte. Und in diesen 20 Jahren habe ich mich manchmal fast auf den Kopf gestellt, um meinen besten ungarischen Freund wieder loszuwerden. Ich bin nicht faul und liebe auch Versuche. Aber sie sind alle gescheitert. Passend zur jetzigen Bewegung \\\"Schreib dein Buch!\\\", könnte ich zum Beispiel darüber mein Buch schreiben. Das wäre schon ein kleiner Roman\\... Wie ist die Lage, die ich jetzt mit der N1 Nagelpilzlösung angehen möchte? Ja, ich habe auch Nagelpilz, er ist allerdings, wie auch mein Fußpilz sonst, eher unauffällig. Man sieht de facto fast nichts. Aber ein Hautarzt hat einmal zwei oder drei Proben von den Nägeln geschabt und testen lassen: Nagelpilz (der sich vermutlich von dem Fußpilz her ausgebreitet hat). Und mein Fußpilz ist nichts als eine kleine, wirklich unauffällige rote Ritze am rechten kleinen Zeh. Aber er nervt, weil er juckt. Und ich halte ihn - ebenso wie den Nagelpilz - seit Jahr und Tag nur unter Kontrolle, indem ich das alles täglich einmal mit Teebaumöl benetze. Davon geht nichts wirklich weg, aber breitet sich auch nicht weiter aus. Am rechten Fuß habe ich allerdings auch besonders viel Hornhaut an den Zehen, die sich recht rasch immer wieder neu bildet. Ich weiß, dass sie ebenfalls durch den Pilz verursacht ist und ihn auch enthält. Gern experimentiere ich jetzt also seit drei Tagen mit der neuen Nagelpilz Lösung. Zur Wirkung lässt sich da selbstverständlich noch nicht viel sagen. Mein erster Eindruck ist allerdings der, dass die Lösung den Nägeln schon bekommt, sie sehen irgendwie frischer aus. Was immer das bedeutet. Ich bin mir nicht ganz sicher, ob das in Ordnung ist, aber ich bepinsele momentan auch die Hornhaut mit der Lösung und sogar die Ritze am kleinen Zeh (was man wohl eigentlich nicht tun sollte). Eventuell lasse ich dann von Letzterem auch wieder ab und versuche parallel noch einmal so etwas wie Canesten. Die Anwendung ist, finde ich, nie ganz so einfach, wie gern versprochen. Dreimal am Tag wäre mir zum Beispiel zu viel. Das liegt daran, dass ich zeitweise schon so viel Aufwand mit der Fußpilzbekämpfung getrieben habe, der sich dann aber immer wieder als sinnlos herausgestellt hat. Mir fehlt daher das Vertrauen in eine solche Investition. Aber im Moment bepinsele ich die Stellen morgens und zur Nacht. Das ist natürlich an sich einfach. Ich hätte mir allerdings gewünscht, dass ich weiß, wie lange das Aufgetragene ungefähr trocknen muss, bevor ich wieder Socken anziehen kann. Nach einer Viertelstunde waren die Nägel bisher immer noch nicht trocken. Und diese Zeit stört schon ein bisschen, zumal man immer wieder auch danach guckt. So sieht es bisher aus. Die Versprechungen zum Produkt sind ja an sich gut: 100 % effektiv, wissenschaftlich bewiesen\\... usw. Wir werden sehen. In einer Woche und dann noch einmal in zwei Wochen trage ich hier Weiteres nach. Zwei Wochen ist ja die Zeit, wo man laut Hersteller schon mehr erkennen müsste. Wie gesagt, es wird sich zeigen. Bis dahin bin ich eigentlich optimistisch. Die vier Sterne sind ein Ausdruck dessen. Gehen Fuß- und Nagelpilz nach einer Zeit wirklich weg, mache ich sehr gern fünf daraus. Nachtrag (2. April): Nun wende ich das Mittel seit ungefähr zwei Wochen an. Auf jeden Fall zweimal täglich, in letzter Zeit oft auch dreimal. Ich habe übrigens den Eindruck, dass man, wenn man nicht so oft zum Einpinseln kommt, auch einmal Teebaumöl mit dem Finger auftragen kann. Das ist erstens hier sowieso enthalten und hat mir zweitens auch bisher gut geholfen. Außerdem geht es fix und man kann danach fast sofort die Socken wieder anziehen. An den Näge htbar -- Aussage zur Wirksamkeit aktuell nur eingeschränkt möglich", "tags": []}, {"r": 4, "t": "Meine Nägel hat es dann wohl auch erwischt gehabt, nachdem ich mir den Zeh gestoßen hatte. zuerst habe ich den Pilz nicht richtig erkannt, erst als auch ein zweiter Zeh anfing. Egal. Das Zeug lässt sich sehr gut anwenden. Da es mit dem Pinsel nicht zu Neuansteckungen kommt, kann man getrost überall pinseln. Das heisst ich pinsel zwischen den Zehen die Nägel und Zehen\\...und warte dann bis das leicht ölige Zeug eingezogen ist. Trockene Zehen sind wichtig. Ich mache es zwischen 2 bis 3 mal am Tag. Wenn ich damit fertig bin nehme ich Nagelpflegöl aus dem Kosmetik Fingernagelbereich und pinsel es auf das Nagelbett. Nun juckt es gar nicht mehr und die Nägel entspannen sich langsam\\...nach einer Woche sehe ich gesunden Nagel nachrücken. Zudem habe ich die beiden befallenen Nägel sehr kurz geschnitten und auch oberflächlich angeschirgelt, damit das Elexier besser einziehen kann und nicht einfach nur ins Nagelbett läuft. Das funktioniert prima. Zusätzlich bewege ich die Zehen beim Fernsehen nackig an der Luft um eine bessere Durchblutung zu erzielen, die das Nagelwachstum begünstigt. Ich finde es teuer, wie letztlich alle anderen Medizinprodukte auch. Deshalb verwende ich es großzügig um nicht nachher eine Schrankleiche zu haben. Ich brauche das in einer Behandlungsphase auf. Hier hilft viel und reglmässig\\... wie gesagt alle Zehen komplett. Das ist MEIN HÖCHSTPERSÖNLICHER ERFAHRUNGSBERICHT: Jeder muss es so machen wie er es selber für richtig hält.", "tags": []}, {"r": 4, "t": "Wirkt, aber Gedult ist gefragt.", "tags": []}, {"r": 4, "t": "Ist sehr gut", "tags": []}, {"r": 4, "t": "Wirkt sehr gut", "tags": []}, {"r": 4, "t": "Es scheint zu wirken. Ich nehme es jetzt seit 6 Wochen. Bis der Nagelpilz wirklich weg geht, muss man das Mittel ca. 12 Monate nehmen. In einer Rezension hier steht, dass nach 3 Tagen der Nagelpilz weg war. Das ist Fake. Wenn der Pilz wirklich weg ist, melde ich mich wieder. Ach ja, ich versuche es seit 20 Jahren mit unterschiedlichen Mitteln.", "tags": []}, {"r": 4, "t": "Das Mittel lässt sich leicht anwenden und scheint auch zu helfen. Allein der Preis ist für die kleine Menge doch recht hoch.", "tags": []}, {"r": 4, "t": "Nehme es schon länger und hoffe auf Besserung One person found this helpful", "tags": []}, {"r": 4, "t": "für Nagelpilz Reviewed in Germany on 24 January 2025 Das Evolsin Anti-Nagelpilz Liquid ist ein Medizinprodukt, das mit seiner wissenschaftlich bestätigten Wirkweise hilft, Nagelpilz zu bekämpfen. Es ist geeignet für Diabetiker und eignet sich sowohl für Füße als auch Hände. Die Anwendung als Nagellack ist einfach und bietet eine sanfte, aber effektive Behandlung. Darüber hinaus wirkt es auch als Nagelhärter und sorgt für stärkere Nägel. Ideal für alle, die Nagelpilz schnell und zuverlässig behandeln möchten.", "tags": []}, {"r": 4, "t": "📍 📦Das Mittel wurde gut und sicher verpackt nach Hause geliefert. 📦 ✔ ⏩immer kommt dieser fu Pilz wieder, 1000 Mittel habe ich schon durch. Hilft dann mal ein und man denkt nun ist es vorbei, kommt es wieder 😅. Man muss am Ball bleiben und die Ursache mit bekämpfen, dieses mal klappt das auch. ✔ ⏩also nicht nur den Nagel betrachten sondern alles, oft ist Fußpilz der Auslöser und wird der nicht behandelt kommt es auch immer wieder. In dieser Kombination klaut es diesmal recht gut, es ist fast komplett raus gewachsen und bis heute nix neues in Sicht. Ich finde ich könnte besser einziehen, hier muss man doch recht lange warten. ✔Mein kurzes Fazit: ⏩Hier gibt es ein gutes Mittel es das macht was es soll. Ich bin zufrieden und gebe gerne 4 Sterne. ✔💐✔Ich hoffe ich konnte Ihnen ein paar nützliche Informationen zukommen lassen und bedanke mich recht herzlich fürs Lesen bis hier hin.✔💐✔", "tags": []}, {"r": 4, "t": "Ich habe schon viele Mittel (z. B. Loceryl, Ciclopoli, Canesten) ausprobiert und nichts hat in irgendeiner Form geholfen. Bei diesem Nagellack ist es etwas anders. Bei einem Nagel, der teilweise betroffen ist, ist eine Besserung zu erkennen - 100%-ig aber auch nicht. Bei einem ganz betroffenen Nagel, ändert sich auch nach mehreren Wochen nicht sehr viel. Habe schon mit der 3. Flasche begonnen. Vielleicht muss man wirklich mehr Geduld haben und es besser 3× statt 2× täglich anwenden.", "tags": []}, {"r": 4, "t": "Ich habe mir dieses Mittel gegen Nagelpilz gekauft, weil ich einen \\\"verpilzten\\\" Nagel am rechten, großen Zeh habe. Der Nagel war darunter etwa mit 2/3 Nagelpilz befallen. Das Mittel habe ich seit über 4 Monaten ab und an in Benutzung und ein sichtbarer Erfolg hat sich bereits eingestellt. Es dauert eben seine Zeit. Der Nagelpilz wird durch das Mittel abgetötet und wächst dann durch das natürlich Nagelwachstum so nach und nach aus dem Nagel heraus. Nach etwas über 4 Monaten Anwendung ist er größtenteils verschwunden aber noch nicht ganz. Größeren Erfolg hat man vielleicht, wenn man das Mittel regelmäßig und Früh und Abends anwendet. Ich habe es meistens nur Abends benutzt. Für ein ähnliches Präparat aus der Apotheke hätte ich für 3ml Lösung schon 26 Euro bezahlt (hätte aber nicht gereicht für die gesamte Anwendungszeit) und hier bekommt man 10ml für unter 20 €. Da sich ein erhoffter Erfolg eingestellt hat, kann ich dieses Nagelpilzmittel weiterempfehlen. One person found this helpful", "tags": []}, {"r": 4, "t": "Schnelle Lieferung,lässt sich gut auftragen ,wenn man über längere Zeit das Produkt nutzt stellt sich langsam eine Verbesserung dar. One person found this helpful", "tags": []}, {"r": 4, "t": "Ich kämpfe seit ca. 10 Jahren an 3 Zehen mit dem Problem. Verursacht durch täglichen Sport und Schwitzen in den Socken und Sportschuhen.Anfangs hatte ich es mit Essig (pH3) versucht. Immer nur ein kurzfristiger Erfolg. Es handelt sich bei diesen Medikamenten , wie Evolsin , bei der Behandlung um eine pH - Verschiebung in den sauren Bereich. Mit Essig auch, aber das funktioniert eben nur kurzfristig. Mit Evolin hat man einen Dauereffekt. Ihr müsst aber möglichst den Nagel vom aktuellen Befall kpl. reinigen. Also abfeilen. Immer und immer wieder. Und mind. 3 x täglich Evolsin mit dem Pinsel auftragen. Ich mache das jetzt seit 4 Wochen. Der Befall ist praktisch weg. Die Nägel fast bis auf die Haut abgefeilt. Den Wuchs kann ich natürlich nicht beschleunigen. Der dicke Zeh braucht halt seine 9-12 Monate. Also Geduld. Tipp : Mit Essig bekommt ihr wieder Füsschen wie ein Baby.", "tags": []}, {"r": 4, "t": "Zart One person found this helpful", "tags": []}, {"r": 4, "t": "Habe über Jahre alles probiert und fast jedes Produkt getestet. Evolsin hat meinen Nagelpilz zwar nicht besiegt aber die Zehennägel sehen viel besser aus. Wende das Produkt jeden Tag 2 Mal an und es bringt wirklich etwas.", "tags": []}, {"r": 4, "t": "ergiebig Reviewed in Germany on 23 January 2024 Nach ca 2 Monate Behandlung wächst eine heile Nagel raus scheint gut zu wirken. Einzige negative trocknet sehr langsam daher morgens als erste nach der Dusche einpinseln damit es genug Zeit hat zu trocknen vor Socken angezogen wird. Habe schon eine 2 Flasche bestellt zum weiterbehandeln damit die Behandlung nicht zu früh angebrochen wird", "tags": []}, {"r": 4, "t": "Tut was es soll One person found this helpful", "tags": []}, {"r": 4, "t": "Meine Erfahrung nach 5 Tagen : Viele Jahre habe ich Gelnägel gehabt. Icg hatte nie Probleme damit bis vor zwei Wochen. Plötzlich hatte sich das Nagelbett an jedem Finger entzündet.. Ich beschloss die Gelnägel abfeilen zu lassen und da der blanke Horror zu Tage !! Nagelpilz an jedem Nagel.. Icg benutze jetzt dieses Liquid seit 5 Tagen und man kann schon eine Verbesserung sehen.. bis zum normalen Nagel ist es noch ein längerer Weg.. Aber ich bin froh das es bereits Wirkung zeigt! Ein Gang zum Hautarzt ist aber in jedem Fall von Nagelpilz unumgänglich.", "tags": []}, {"r": 4, "t": "Das war für meine Großeltern. Haben schon vieles probiert. Nichts hat funktioniert Hier sieht man auch noch nicht viel aber meine Oma meinte es tut ihr nicht mehr so weh wie vorher . Wenn man danach geht ist das schonmal schön . Also man kann es nur probieren . Bei Ihnen hat es nichts sehr optisch aber bemerklich verändert. Kann man kaufen .", "tags": []}, {"r": 4, "t": "Für mich persönlich war es das einzige Produkt was wirklich geholfen hat. Hatte einiges ausprobiert und es wurde trotzdem immer schlimmer. Hab es hiermit wegbekommen, jeweils 1x morgens und abends raufgemacht. 1 Stern Abzug weil es wirklich teuer ist für die kleine Menge.", "tags": []}, {"r": 4, "t": "Mich nervte mein ausgeprägter Nagelpilz zum Schluss ziemlich. Daher versuchte ich nun mal dieses Mittel - ohne wirklich eine Erwartung zu haben, denn die meisten Produkte helfen nicht so wirklich. Nachdem ich das hier so gut es geht 2 x täglich (morgens und abends) aufgetragen habe, breitete sich der Pilz nicht weiter aus. Selbst meine Fußpflegelady war vom Ergebnis angetan und empfiehlt das Produkt nun einer Kundin mit ähnlichem Beschwerdebild. Ich werde das nun weiter verwenden und hoffe auf vollständige Heilung bis zur Freiluftsaison.", "tags": []}, {"r": 4, "t": "Ich hab mir das Produkt damals gekauft, weil ich an zwei Fingernägeln Nagelpilz hatte. Zunächst habe ich das Mittel nur auf den Nagel aufgetragen und damit keinen Effekt erreicht. Dann bin ich aber auf die Idee gekommen das Produkt unter dem Nagel aufzutragen und dann ging es ziemlich schnell bis ich erste Erfolge sehen konnte und mittlerweile ist der komplette Nagelpilz weg. Was man aber dazu sagen muss ist, dass ich den Nagelpilz zum Glück nur im oberen Bereich des Nagels hatte und dadurch direkt an die betroffenen Stelle gekommen bin.", "tags": []}, {"r": 4, "t": "Das Produkt scheint endlich zu helfen sieht jedenfalls danach aus habe schon soviel ausprobiert ohne größeren erfolg", "tags": []}, {"r": 4, "t": "Ich habe in der Vergangenheit so ziemlich alle rezeptfreien Präparate und auch diverse Hausmittelchen ausprobiert - vergeblich. Das Maximum an Erfolg war, dass ich die Ausbreitung stoppen bzw. verlangsamen konnte. Jetzt bin ich zum ersten Mal vorsichtig optimistisch. Ich stelle nach mehreren Wochen Anwendung eine zumindest leichte Besserung fest. Die Verfärbungen werden schwächer, der Nagel wächst zusehends gesund nach. Das Mittel ist leicht ölig und lässt sich gut mit dem mitgelieferten Pinsel auftragen. Bis alles getrocknet ist, dauert es dann ein paar Minuten. Wer hier von einer sofortigen Wirkung spricht, oder enttäuscht ist, dass diese eben nicht sofort eintritt, träumt oder hat von Nagelpilz nur wenig bis keine Ahnung. Die Heilung eines (stark) befallenen Nagels zieht sich wohl über mehrere Monate bis zu einem Jahr hin. Bei weiteren, hoffentlich positiven Veränderungen werde ich nachberichten.", "tags": []}, {"r": 4, "t": "Alles super One person found this helpful", "tags": []}, {"r": 4, "t": "Zieht schnell und gut ein. Erfolg ist da. Zu empfehlen.", "tags": []}, {"r": 4, "t": "Ist halt langwierig, allerdings konnte ich nach einigen Woche Anwendung schon so manche Pilzschuppe entfernen. One person found this helpful", "tags": []}, {"r": 4, "t": "Leicht zum Auftragen. Man sieht Fortschritte, man muss es aber über einen langen Zeitraum verwenden.", "tags": []}, {"r": 4, "t": "Tag Reviewed in Germany on 25 March 2024 Der Verschluß ist nicht nur Kindersicher sondern auch Erwachsenensicher. Nervt mich total der Verschluß. Würde ich mir definitiv nicht nochmal kaufen.", "tags": []}, {"r": 4, "t": "Wirkt zwar aber Ergebnis nicht zufriedenstellend One person found this helpful", "tags": []}, {"r": 4, "t": "Bereits seit 2 Monaten benutze ich Evolsin und die betroffenen Nägel sind auch schon deutlich besser geworden. Was mich aber unsagbar ärgert ist, dass die Pappschachtel fast doppelt (!!) So groß ist, wie das Fläschchen mit der Lösung. Die Gebrauchsanleitung liegt unten um das Fläschchen und oben ist einfach ganz viel NICHTS. Das ist Papierverschwendung und außerdem die Kunden vera\\.....t!!", "tags": []}, {"r": 4, "t": "die Anwendung ist leicht mit beigefügten Pinsel und in der Wirksamkeit sehr schonend. Also, man sollte oft die Anwendung versuchen. Es ist leicht durch Waschen zu entfernen. Ich habe die zweite Flasche gekauft.", "tags": []}, {"r": 4, "t": "Gut aufzutragen", "tags": []}, {"r": 4, "t": "Toll", "tags": []}, {"r": 4, "t": "Ich nehme die Tinktur seit 6 Wochen und ein sichtbares Ergebnis ist noch nicht zu sehen. Als Tipp kann ich nur sagen, dass man unbedingt zwischendurch ein pflegendes Nagelöl nehmen sollte", "tags": []}, {"r": 4, "t": "4 Sterne weil es funktioniert und nicht unangenehm in der Anwendung ist. Keine 5 Sterne weil es doch sehr lange dauert bis man Erfolge sieht.", "tags": []}, {"r": 4, "t": "Die Behandlung ist recht einfach! One person found this helpful", "tags": []}, {"r": 4, "t": "ich habe das PRODUKT NOCH NICHT LANGE;aber es gefällt mir ,ich habe das Gefühl das eine Besserung eingetreten ist.Ich verwende es täglich früh und abends.mal sehen wie in ein paar Wochen das Ergebnis ist. Vielen Dank R.Loeber", "tags": []}, {"r": 4, "t": "Ich kann den Artikel noch nicht beurteilen, Fušpllzbehanlung kann Jahre dauern. Hatte zwischendurch nochmal eigenen anderen Artikel One person found this helpful", "tags": []}, {"r": 4, "t": "Bist jetzt sieht gut aus.", "tags": []}, {"r": 4, "t": "Probleme mehr Reviewed in Germany on 17 June 2023 Funktioniert Super, nach mehrtägiger Anwendung keine Probleme mehr, allerdings ist der Preis etwas überteuert, aber was will man machen wenn man es unbedingt brauch :-/", "tags": []}, {"r": 4, "t": "Schnell geliefert, Hilfe kann ich erst in ein paar Monaten erwarten. Lässt sich aber gut auftragen. One person found this helpful", "tags": []}, {"r": 4, "t": "Ist ok", "tags": []}, {"r": 4, "t": "Ich finde dieses Liquid ist einfach aufzutragen, riecht nicht und zieht schnell ein. Allerdings finde ich das es den Nagel der nicht von dem Pilz betroffen ist austrocknet.", "tags": []}, {"r": 4, "t": "Nägel s  Fläschchen aus. Der Preis ist echt fair. Kann ich nur weiterempfehlen. One person found this helpful", "tags": []}, {"r": 4, "t": "Habe es jetzt einige Zeit genutzt. Es hat sich etwas bessert jedoch muss man echt geduld haben.", "tags": []}, {"r": 4, "t": "bis die Nägel wieder gesund aussehen! Reviewed in Germany on 24 April 2022 Durch das Pinseln geht es sehr schnell und praktisch. Dauert etwas bis der Lack eingezogen ist. One person found this helpful", "tags": []}, {"r": 4, "t": "Lässt sich leicht auftragen, riecht angenehm, scheint auch schon zu wirken. Gefällt mir One person found this helpful", "tags": []}, {"r": 4, "t": "Alles wie erwartet", "tags": []}, {"r": 4, "t": "Ich nehme die Antipilz-Lösung erst seit 2 Wochen und kann daher über die Wirksamkeit noch nicht viel sagen.", "tags": []}, {"r": 4, "t": "Hält was es verspricht- wenn man es durchzieht", "tags": []}, {"r": 4, "t": "Hilft und ist wirksam auch leicht aufzutragen.", "tags": []}, {"r": 4, "t": "Dauert zu lange One person found this helpful", "tags": []}, {"r": 4, "t": "Ich besser als andere", "tags": []}, {"r": 4, "t": "Gutes Produkt, schnelle Lieferung, tut was es soll", "tags": []}, {"r": 4, "t": "Ab und zu trage ich es auf damit es vorbeugend wirkt. One person found this helpful", "tags": []}, {"r": 4, "t": "Wenn man das Produkt morgens und abends regelmäßig anwendet tut es seine Wirkung. One person found this helpful", "tags": []}, {"r": 4, "t": "Für mein Nagelpilz am großen Zeh", "tags": []}, {"r": 4, "t": "Erste Woche Zweifel. Jetzt Erfolge.", "tags": []}, {"r": 4, "t": "Funktioniert", "tags": []}, {"r": 4, "t": "probiertes aus mit mäßigen erfolg One person found this helpful", "tags": []}, {"r": 4, "t": "InArbeit.", "tags": []}, {"r": 4, "t": "Nagelpilz One person found this helpful", "tags": []}, {"r": 4, "t": "Ist O.k One person found this helpful", "tags": []}, {"r": 4, "t": "Habe zum wiederholten male gekauft. Der Lack läßt sich gut auftragen und trocknet auch relativ schnell. Da meine Zehennägel sehr stark vom Pilz befallen sind und ich dies nicht rechtzeitig ernst genommen habe, muss ich nun leider länger Geduld aufbringen und hoffe auf einen baldigen sichtbaren Erfolg.", "tags": []}, {"r": 4, "t": "Bei dreimal auftragen am Tag sieht der Fussnagel aber spröde aus.", "tags": []}, {"r": 4, "t": "Ich nehme das Mittel jetzt knapp3 Wochen und habe tatsächlich eine erste Besserung bemerkt an den Nägeln Da ich seit Jahren gegen Nagelpilz an den Füßen leide und viel Geld für verschiedene Salben\\...Liquid..usw ausgegeben habe bin ich skeptisch\\...nun,ich leide unter Chronischen Lympödemen seit 14 Jahren. Daher bekam ich auch plötzlich Fußnagel Pilz wegen tragen von Stützstrümpfen die manchmal feucht werden\\...ich nehme das Mittel und Wechsel jeden Tag Stützstrümpfe..Bettwäsche\\...Schuhe jeden Tag desinfizieren\\...es ist anstrengend\\...aber es muss helfen\\...hoffe ich zumindest One person found this helpful", "tags": []}, {"r": 4, "t": "Endlich mal ein Produkt, welches wirklich hilft!! Viele versprechen etwas, halten aber nichts!! Aber das hält, was es verspricht!!", "tags": []}, {"r": 4, "t": "Sehr zufrieden One person found this helpful", "tags": []}, {"r": 4, "t": "Bin mit dem Mittel zufrieden", "tags": []}, {"r": 4, "t": "Ich hab seit 15 diesen Schei.. Pilz. Schon alles probiert außer die böse Chemie-Pille. Aber diese Tinktur wirkt tatsächlich. Nicht zu glauben. Unbedingt regelmäßig auftragen und Geduld haben. Dann wirds.", "tags": []}, {"r": 5, "t": "Wunderbar", "tags": []}, {"r": 5, "t": "Im Gegensatz zu anderen Mitteln habe ich hier schon früh das Gefühl, dass sich etwas tut. Der Nagel wirkt etwas klarer und nicht mehr ganz so angegriffen wie vorher. Natürlich kann man nach so kurzer Zeit (1 Woche) noch kein Wunder erwarten, aber allein, dass ich eine Veränderung wahrnehme, gibt mir ein gutes Gefühl. Bisher bin ich auf jeden Fall zufrieden und werde ihn weiter anwenden.", "tags": []}, {"r": 5, "t": "Great", "tags": []}, {"r": 5, "t": "Überraschend günstig. Besser als Online-Apotheke.", "tags": []}, {"r": 5, "t": "Klein aber gut", "tags": []}, {"r": 5, "t": "Ausgezeichnetes Produkt. Verwende es seit langem , tatsächlich , bei regelmäßiger Anwendung , der Pilz verschwindet! Aber es dauert schon lange , man muss nur Geduld haben , dann Klappt es", "tags": []}, {"r": 5, "t": "Hat sofort geholfen", "tags": []}, {"r": 5, "t": "Das einzige Mittel,dass endlich wirklich geholfen hat !!!", "tags": []}, {"r": 5, "t": "Ich bin sehr zufrieden mit Evolsin. Es hält, was es verspricht. Schon nach 4 Wochen Einsatz konnte ich eine deutliche Verbesserung feststellen. Ich kann Evolsin nur empfehlen.", "tags": []}, {"r": 5, "t": "(Update ganz unten) Stand April 24: Habe vor ca. 4 Monaten mit der Behandlung angefangen und es lassen sich gute Ergebnisse blicken. Der rechte große Zeh hatte nur einen leichten befall und ist in den 4 Monaten zu ca. 50% pilzfrei nachgewachsen (sieht man an der Linie in der Mitte des Nagels. Alle Nägel vom linken Fuß waren stark betroffen, bröckelig und gelblich verfärbt, daraufhin habe ich so viel wie möglich von den Nägeln abgeschnitten und abgeschliffen und zusätzlich mit dem Canesten Nagelpilz Set eingeweicht um so viel wie möglich vom infizierten Nagel abzutragen. Seitdem wachsen auch dort alle Nägel langsam ohne Pilz nach. Zur Behandlung von leichtem Nagelpilz und zur Unterstützung nach stärkerem Befall ist Evolsin echt spitze. Es muss aber klar sein das bei stärkeren Verfärbungen des Nagels nur das entfernen des infizierten Nagels den weg zu einem gesunden Nagel ebnen kann. Update März 25: Fast ein ganzes Jahr später (siehe zweites Bild) würde ich sagen sind meine Zehen Nägel wesentlich schöner als noch im März 24 und gut nachgewachsen, lediglich der große Zeh am Linken Fuß hat noch an den Seiten leicht gelbe stellen (was gut daran liegen kann, dass ich das Evolsin nur einmal pro Woche auftrage, würde ich es häufiger nutzen wären meine Nägel vielleicht schon komplett ohne Verfärbungen). Ein Pilzbefall der ohnehin extrem langsam wachsenden Fußnagel ist sehr langwierig zu behandeln, aber ich bin zuversichtlich in weiteren 6 Monaten wieder komplett saubere und schöne Fußnägel zu haben. Alles in allem finde ich Evolsin einfach spitze.", "tags": []}, {"r": 5, "t": "Hat bei mir bisher als einziges Mittel gegen Nagelpilz geholfen. Man braucht halt ein wenig Ausdauer; aber das ist mir die Sache wert. One person found this helpful", "tags": []}, {"r": 5, "t": "Bislang gute Ergebnisse, bin sehr zufrieden - einen Monat nach Anwendungsbeginn. Brauche aber natürlich noch länger, um aussagekräftige Ergebnisse vorzustellen. Dennoch: Ich kaufe mir auf jeden Fall ein neues Fläschchen.", "tags": []}, {"r": 5, "t": "Alles super👍", "tags": []}, {"r": 5, "t": "Preis ok.", "tags": []}, {"r": 5, "t": "Nach 20 Tagen bereits deutliche Besserung! Die Nägel waren vom Befall sehr verfärbt und lösten sich bereits unterhalb! Also einfach mal so gut es ging den Nagel vom befallenen Teil befreit und fleissig 2mal täglich gepinselt! Einmal pro Woche feile ich den Nagel um die Fläche anzurauen um dem Mittel die Möglichkeit zu geben tiefer einzuziehen! Ich hatte lange Probleme und inzwischen auch Schmerzen im nagelbereich! Ich bin froh es gekauft zu haben aufgrund der guten Rezessionen und kann nach 20 Tagen sagen es wirkt wirklich! Ich hab das Mittel auch unter den Nagel gepinselt und wirklich keine Stelle ausgelassen! Also ich werde es weiter benutzen um endlich wieder schmerzfreie und schöne fussnägel zu haben! Es ist langwierig und nach einer Woche nicht weg! Der Nagel muss komplett gesund nachgewachsen sein! Also fleissig weiterpinseln und dem Nagel Zeit geben um zu heilen! Top Produkt Update: nach fast einem Jahr ist mein Nagel komplett nachgewachsen und gesund! Das letzte Bild sagt alles! Mache es immer mal wieder sporadisch drauf aber seither bin ich Schmerz- und Befallfrei! Habe für die Behandlung zwei Flaschen benötigt und immernoch genügend in der Flasche! Ich bin so glücklich es endlich geschafft zu haben und Vorallem schmerzfrei! Es war ein Versuch wert und habe es nicht bereut! Es ist ein langer Prozess und man muss Geduld haben! Aber auf Dauer hat es sich ausgezahlt dran zu bleiben! Drücke jedem nagelpilzgeplagten die Daumen es wieder los zu werden!", "tags": []}, {"r": 5, "t": "Scheint zu funktionieren", "tags": []}, {"r": 5, "t": "Veränderung festgestellt! Reviewed in Germany on 19 October 2022 Ich habe seit Jahrzehnten Nagelpilz . Mir ist etwas auf den Fuß gefallen. Nagel wurde blau,Nagel wurde schwarz und viel ab. Nachdem er nachgewachsen war,fing es an. Der Nagel veränderte sich, erst dachte ich mir nichts dabei,doch irgendwann ging ich zum Hautarzt. Diagnose Nagelpilz! Ich bekam einen Lack verordnet. Lack und Kleine Pfeilen . Ich habe das über Wochen gemacht,nichts veränderte sich. Der Hautarzt ranzte mich nur an „ich würde mich nicht an die Anleitung halten. Na toll. Ich sollte zusätzlich eine Fußpflege nehmen. Gesagt getan. Sie meinte das geht so nicht,ein Hautarzt muss mir Tabletten verschreiben. Ich habe Tabletten bekommen,keine Änderung. Ich habe eine Creme bekommen, damit der Nagel abfällt. Keine Änderung nach dem der Nagel zurück war. Wieder Tabletten! Usw. Ich gab auf. Ging zur Fußpflege und das wars. Vor gut einem Monat hat mir meine Freundin dieses Präparat gezeigt,Sie wollte es mal probieren. Ich dachte,was soll\\'s, ich habe bereits so viel Geld versenkt. Also bestelle ich die Flasche. Anfangs war ich noch ganz akribisch. Es war noch warm und ich trug noch keine Strümpfe und feste Schuhe. Mittlerweile bin ich ein wenig nach lässig geworden. Aber das Mittel kann sich sehen lassen. Das erste mal seit Jahrzehnten traue ich mich mal meine Füße zu zeigen!👍", "tags": []}, {"r": 5, "t": "Die Nagelpilz ist noch nicht ganz weg, aber langsamer wird er kleiner und die Beschwerden werden weniger.", "tags": []}, {"r": 5, "t": "Anwendung Reviewed in Germany on 24 August 2025 Nagelpilz ist sehr unangenehm und außerdem ungewöhnlich hartnäckig und schwer zu bekämpfen. Evolsin war das einzige Mittel das wirklich geholfen hat ihn endgültig los zu werden. Voraussetzung war: Genau so hartnäckig täglich die befallene Stelle zu behandeln und täglich Strümpfe wechseln. Auch sämtliche Schuhe auszutauschen.", "tags": []}, {"r": 5, "t": "Ich kann mich den abgegebenen positiven Rezensionen nur anschließen! Vor ca. 8 Jahren stellte ich an beiden großen Zehen leichten Nagelpilzbefall fest, die ich mit allmöglichen verschreibungspflichtigen und apothekenfreiverkäuflichen Produkten ohne durchschlagende Erfolge behandelte, ebenso mit unzähligen Hausmittelchen, die im Internet angepriesen wurden. Aus anfangs leicht gelblichen Verfärbungen kamen feine Nagelrisse hinzu. Trotz regelmäßigem Abfeilen (1x wöchentlich) und einer entsprechenden med. Nagelpflege trat keine Besserung ein, vielmehr zeigten beidseitig die Nägel der 2. Zehe - seit ca. 1 Jahr - auch schon Veränderungen (in Richtung Holznägel). Nach anweisungsbefolgendem Auftragen sah ich bereits am 3. Tag erste Erfolge. Die gelbliche Verfärbung verschwand und die hellrosa Nagelbettfarbe blitzt wieder durch. Nach nunmehr knapp 2 Wochen Behandlung, ist am re. Zeh, der minimal befallen war, gar nichts mehr zu sehen und linksseitig minimal; die (Holz-)Nägel der 2. Zehen (beidseitig) sind weicher geworden und wachsen gesund nach. Zudem sei erwähnt, dass ich gleichzeitig meine ebenso hartnäckige Dornwarze mit dieser Tinktur versorge und hier ebenfalls entsprechende Erfolge erziele. Sie ist schon weitaus weicher und kleiner geworden; Hauterhebungen oder auch -wucherungen um die Dornwarze bleiben aus. Auf jeden Fall gibt es von mir eine klare Kaufempfehlung (!) Ich gebe spätestens nochmals ein Feedback ab, sobald die betroffenen Nägel komplett gesund nachgewachsen sind und auch zur mitbehandelten Dornwarze.", "tags": []}, {"r": 5, "t": "Es ist das einzige Mittel und ich hatte einige die letzten 3 Jahre, das wirkt. Es ist unglaublich aber der Nagel erholt sich und wächst von hinten nach Vorne klar heraus. Beide Zehen waren richtig schwarz, jetzt sind sie viel heller und wachsen raus. Auch der Nagel selbst erholt sich und ist nicht mehr spröde. Kann ich echt nur empfehlen. Ich mache es Morgens und Abends drauf. Die Menge ist sehr lange haltbar und nicht so teuer wie andere Produkte die nichts brachten. Keine Ahnung warum dieses Mittel wirkt und die hochgepriesenen die man 1x die Woche z.B. drauf tut nicht gewirkt haben. 20.08.2023 Wie ich hier lesen kann gibt es auch Nutzer bei denen es nicht wirkt. Wahrscheinlich ist es von einigen Faktoren abhängig die uns Laien nicht bekannt sind. Jedenfalls muss wohl jeder Mittel probieren bis er das richtige gefunden hat denke ich.", "tags": []}, {"r": 5, "t": "Ich habe es schon das zweite Mal bestellt, weil es einfach hilft. Schnelle Lieferung, gute Verpackung. Anderen Produkten weit voraus. Immer wieder. 👍", "tags": []}, {"r": 5, "t": "Ich habe im Grunde genommen sehr gepflegte füsse, und nach einem Sommerurlaub, nachdem ich meinen nagellack abgemacht habe, habe ich einen Schrecken bekommen. Nagelpilz an beiden grossen zehn. Na super, noch nie gehabt. Gesucht was helfen soll, verschiedene Rezessionen gelesen, und dann stand ich da, total verzweifelt, weil der eine so, der andere so. Ich hab es einfach bestellt und wollte es ausprobieren. Ich trage es 2 bis 3 mal täglich auf, lasse es einwirken und ziehe dann erst socken drüber. Ich habe es jetzt ca. 3 Monate in gebrauch, und bin jetzt fast fettig mit der Behandlung. Bei mir hilft es sehr gut, habe regelmäßig oben den Nagel gekürzt und es Wächst quasi mit raus:) Ich denke noch 4 Wochen dann bin ich durch. Bin sehr zufrieden mit dem Produkt. Es ist noch die Hälfte drinnen, werde es vorsorglich noch etwas länger auftragen auch wenn ich denke das es weg ist. Würde es wieder kaufen. :)", "tags": []}, {"r": 5, "t": "Schnelle Lieferung,gute Ware und fairer Preis.", "tags": []}, {"r": 5, "t": "Sehr gutes Produkt", "tags": []}, {"r": 5, "t": "alles okay", "tags": []}, {"r": 5, "t": "Good product, works after just a few days", "tags": []}, {"r": 5, "t": "Es scheint wirklich zu wirken, habe es noch mal bestellt.", "tags": []}, {"r": 5, "t": "Der Nagelpilz Lack hat sich für mich als äußerst wirksame Lösung erwiesen. Nachdem ich jahrelang mit Nagelpilz zu kämpfen hatte, habe ich endlich eine Lösung gefunden, die funktioniert. Die Anwendung ist denkbar einfach: Der Lack lässt sich problemlos auftragen und trocknet schnell. Die regelmäßige Anwendung über mehrere Wochen hat dazu geführt, dass sich mein betroffener Nagel allmählich erholt hat. Die Infektion hat sich sichtbar zurückgebildet und die neue Nagelplatte wächst gesund nach. Ein weiterer Pluspunkt ist, dass der Lack geruchsneutral ist und keine störenden Gerüche hinterlässt. Das hat die Anwendung im Alltag angenehm gemacht. Obwohl die Behandlung etwas Geduld erfordert, hat sich der Nagelpilz Lack für mich als äußerst effektiv erwiesen. Ich kann ihn jedem empfehlen, der mit Nagelpilz zu kämpfen hat und eine zuverlässige Lösung sucht.", "tags": []}, {"r": 5, "t": "kurze Vorgeschichte: Da ich Psoriasis-Patientin bin (regelmäßig beim Hautarzt!) bin ich davon ausgegangen, daß die Hautveränderungen an meinen Füßen in dieses Krankheitsbild fallen. Wegen einer kleinen gelblichen Stelle auf dem Fußnagel bestellte ich diese Tinktur und \\\"rein Spaßeshalber\\\" bepinselte ich auch die rissigen trockenen Stellen an der Ferse und am großen Zeh. Direkt nach dem Auftragen veränderte sich der Zustand der verhornten Stellen. Zuerst nahm ich an, daß die ölige Konsistenz der Grund dafür ist, aber heute morgen, 1 Tag nach der 1.Anwendung ist die Haut kaum noch verschorft, viel weicher und entspannt. Ich war heute morgen wirklich den Tränen nah, weil ich nicht früher drauf gekommen bin, daß ich einen Hautpilz an den Füßen habe (bald hatte :) ) und noch nichtmal vom Hautarzt gab es darauf einen Hinweis, daß es soetwas sein könnte\\... 100 Punkte für diese Tinktur, ich kann sie jedem empfehlen, vor allem, wenn man an Psoriasis leidet und es mit rissigen Fußsohlen und -zehen in Zusammenhang bringt. DANKE !!!!!", "tags": []}, {"r": 5, "t": "Ich hatte zuvor ein anderes Produkt mit ebenso hoher Bewertung aus den USA ausprobiert und in drei Wochen passierte gar nichts, keinerlei Heilung. Ich dachte schon, das diese Produkte generell bei mir nicht wirken (wegen der hohen Bewertungen), aber habe dann doch diesem deutschen Nagelpilz Liquid eine Chance gegeben. Und siehe da: nach nur drei Tagen ist der Nagelpilz endlich weg! Kann ich also absolut empfehlen.", "tags": []}, {"r": 5, "t": "Ich hatte an beiden großen Zehen mir vor vielen Jahren einen Nagelpilz eingefangen. Hatte alles probiert, wirklich alles!!!!! Jedes Produkt aus der Werbung, jede Technik und und und\\... Zwischenzeitlich würde es Mal besser mit einem anderen Produkt, aber sobald man das absetzte war nach 2 Tagen alles beim Alten. Dann fand ich dieses Produkt und war vom Preis her angetan und die Rezessionen waren gut. Zu verlieren hatte ich nichts und kaufte gleich 2 Packungen. Habe es so gut wie jeden Tag 2 Mal aufgetragen, einmal die Zehen gründlich geschnitten und einmal sogar abgepfeilt. Was soll ich sagen, nach knapp 2 Monaten sehen meine großen Zehen aus wie neu!!!! Kein Gelb/Grüner Farbstich mehr, schön nachgewachsener Zeh!!! Ich bin so zufrieden. Ich werde das noch eine Weile weiter nutzen, damit sich nichts neu bilden kann und irgendwan mein Schuhwerk ausgetauscht ist. Sehr zu empfehlen. One person found this helpful", "tags": []}, {"r": 5, "t": "Endlich mal was wirklich hilft! One person found this helpful", "tags": []}, {"r": 5, "t": "Ich habe leichten Nagelpilz, den behandle ich mit diesem Mittel und bin begeistert. One person found this helpful", "tags": []}, {"r": 5, "t": "Muy bueno 👍", "tags": []}, {"r": 5, "t": "Practical and easy to use, can last for 3 months if applied regularly. One person found this helpful", "tags": []}, {"r": 5, "t": "Ich benutze den Nagellack nun seit ca 1 Woche und selbst nach dieser so kurzen Zeit bemerke ich schon eine sehr starke Verbesserung der Fußnägel. Zwar muss man den Nagellack 2 x täglich verwenden, dennoch ist die Handhabung so schnell und einfach, dass es nach kurzer Zeit schon zur Routine geworden ist 😊 Ich bin begeistert und bin mir sicher, dass der Sommer Urlaub bald starten kann 😍 Das Produkt riecht überhaupt gar nicht bis sehr neutral, es brennt nicht und ich habe ein sehr gutes Gefühl 🥰", "tags": []}, {"r": 5, "t": "Seit Ende März benutze ich diese Tinktur. Meine zwei großen Zehnägel waren gelb. Erst dachte ich es wäre vom roten Nagelack, aber ich wurde eines besseren belehrt. Nagelpilz, klasse. Nach 5,5 Monaten ist es über die Hälfte rausgewachsen. 1/4 des Nagels muss noch rauswachsen, der ist noch etwas leicht gelblich. Der Rest sieht wieder gesund und normal aus. Normalerweise schreibe ich keine Rezensionen, aber ich hoffe es hilft einigen. Wichtig ist die Regelmäßige Anwendung 2x Täglich. Sonst kein Erfolg! Und es ist nicht nach vier Wochen erledigt, macht mal ein fast ganzes Jahr drauß. Ist der Befall sehr stark empfehle ich das Mittel nicht, sondern einen Arzt. Viel Erfolg", "tags": []}, {"r": 5, "t": "Volle Empfehlung\\...!", "tags": []}, {"r": 5, "t": "Gut und günstig, sehr zu empfehlen!", "tags": []}, {"r": 5, "t": "Ich bin positiv überrascht, nach 7 Tagen seh ich definitiv schon eine deutliche Verbesserung. Wenn man es so macht wie beschrieben morgens und abends und 1x die Woche Pfeilen des Nagels ist man schnell durch damit. Ich habe bereits sämtliche andere Dinge ausprobiert, wenn schon wurde es Schlimmer oder garkeine Verbesserung. Für mich ist dieses Mittel bis jetzt eines der besten und zeigt nach kurzer Zeit schon Besserung des nagels an. Es ist teuer aber es lohnt sich, hab schon viel teurere Produkte gekauft die einfach nicht geholfen haben.", "tags": []}, {"r": 5, "t": "Das Beste,was es gibt gegen Nagelpilz und wirklich hilft. Immer wieder und weiter. One person found this helpful", "tags": []}, {"r": 5, "t": "alles gut", "tags": []}, {"r": 5, "t": "Ich hatte es nicht erwartet aber nach konsequenter Anwendung hat sich der Nagelpilz tats. verflüchtigt. Ich empfehle es auch weiter anzuwenden einen ganze Zeit nachdem der Nagelpilz nicht mehr sichtbar ist, da er sonst schnell wieder kommen könnte. Eine Flasche reicht eine ganze Zeit aus. Leider trocknet das Material eher langsam weswegen man mit Bettdecke/Schuhen/Socken nach dem Auftragen etwas warten sollte.", "tags": []}, {"r": 5, "t": "Gefühlt mein Leben lang kämpfe ich gegen Haut-und Nagelpilz (ausgelöst durch Amalgam und Quecksilber). Sechs Nägel an den Füßen und zwei an den Fingern. Alles ausprobiert, immer wieder etwas geholfen, und dann war der Pilz wieder da. Selbst aus der Apotheke, nix hat geholfen. Jahre über Jahre. Nun hatte ich dieses Produkt auch mal ausprobiert. Bereits nach drei Tagen worden die betroffenen Stellen so eine Art weiß. Das heißt, diese unnötigen Pilze sterben. Nach kurzer Zeit wachsen die Nägel gesund nach. Es wirkt schneller als erwartet. Allerdings feile ich mit der Nagelpfeile immer meine Nägel kurz an. Dann nutze ich es nur häufig nur einmal Abends, obwohl zwei Mal empfohlen wird. Es wirkt dennoch. Mir hat es sehr geholfen. Danke dafür.", "tags": []}, {"r": 5, "t": "Super geklappt One person found this helpful", "tags": []}, {"r": 5, "t": "Gute Wirkung One person found this helpful", "tags": []}, {"r": 5, "t": "Schnell und zuverlässig One person found this helpful", "tags": []}, {"r": 5, "t": "Man darf nicht erwarten das innerhalb von ein paar Wochen sich das Thema erledigt hat. ABER - Es ist seit Jahren das erste wirklich Mittel wo man sieht das es Besserung gibt und sich das \\\"Bild\\\" tatsächlich immer weiter verändert. Ich habe am großen Zeh seit Jahren das Thema NP. Ich benutze es 2 mal täglich. Der Preis ist für die 10ml angemessen und ich habe für anderes weit mehr schon ausgeben. Ich würde dieses Produkt jedem Empfehlen es über 2 Monate zu nehmen. Bei mir war nach knapp 3 Wochen zu sehen das sich das Nagelbett am Ansatz verändert.", "tags": []}, {"r": 5, "t": "Gutes Produkt. Hat bisher immer geholfen 👍🏻 One person found this helpful", "tags": []}, {"r": 5, "t": "In den Rezensionen und im Netz kann man lesen, dass die Behandlung ein Jahr dauert. Bereits nach einer Woche auftragen konnte ich den betroffenen Teil des Nagels, der förmlich aufgeweicht war, ganz leicht und vorsichtig ablösen. Nun heißt es abwarten mit dem herauswachsen. Ich bin positiv überrascht und hoffe das Beste.", "tags": []}, {"r": 5, "t": "Die Wirksamkeit kann ich nicht abschließend beurteilen, da ich von einem anderen Produkt gewechselt habe. Aber, was ich sagen kann: • Verteilt sich schnell und gleichmäßig • Pinsel! Viele Produkte benutzen Spatel, die nerven wahnsinnig. Der Pinsel geht schnell und sicher, verklebt aber nicht • Bei meinem anderen Produkt klebte nach einigen Anwendungen der Schraubverschluss am Gewinde fest (Lack). Das passiert hier nicht • Die Schicht, die zurückbleibt klebt keine Fusseln von den Socken fest • Durch die gute Dosierung mit dem Pinsel hält die Flasche sehr lange Falls ich noch mal Probleme mit Nagelpilz bekomme, werde ich dieses Produkt als erstes probieren.", "tags": []}, {"r": 5, "t": "Ich habe es wirklich nicht geglaubt - aber der Nagelpilz der bis an die Nagelwurzel ragte verschwindet. Ich habe vorher alles probiert - insbesondere das Mittel das den Nagel auflöst und dann spektakulär halb auseinanderfällt. Die ganze Haut wird dadurch auch noch in Mitleidenschaft gezogen. Ich bestreiche bei diesem Mittel nachts den Nagel, das wars\\....wirklich nicht mehr. Der Hautarzt wollte gleich die Chemiekeule nehmen und mir Tabletten verschreiben - alle 6 Wochen Leberwerte testen lassen\\....nein danke!!", "tags": []}, {"r": 5, "t": "Seit vielen Jahren verwende ich alle möglichen Mittel und Tinkturen, ohne nennenswerten Erfolg. Durch Zufall habe ich Evolsin entdeckt und trage es seit 4 Wochen auf den befallenen Nagel auf. Zu meiner großen Freude muss ich feststellen, dass eine deutliche Besserung eingetreten ist - der Nagelpilz scheint sich nicht weiter auszubreiten. Etwas unschön ist die dunkle Verfärbung, aber das nehme ich gerne in Kauf :-) Jetzt heißt es nur noch Abwarten, bis der Nagel vollständig rausgewachsen ist. Vielen Dank dafür, dass endlich mal jemand eine wirkungsvolle Tinktur entwickelt hat!", "tags": []}, {"r": 5, "t": "Ich wende es seit Mitte 09/2022 an und trotz schon gespaltener Fußnägel hat es gewirkt ohne Ende! Wunderbar. Ich kann in diesem Sommer wieder offene Sandalen tragen, ohne mich zu schämen. - Das Schöne ist, dass das Preis-Leistungs-Verhältnis, weil das Evolsin-Liquid soo ergiebig ist, genial ist und vor allem OHNE Nebenwirkungen auf den Körper, da es nur äußerlich angewendet wird. - Ich empfehle aber, es mind. 1 Jahr durchzuhalten und (Arzt)Socken zu verwenden, die absolut kochbar sind\\..... Ich weiß, die Mühe, - aber es lohnt sich.", "tags": []}, {"r": 5, "t": "Ich plage mich seit einem Klinikaufenthalt 2018 mit Nagelpilz herum . Mal mehr , mal weniger - je nach Mittel , was ich nutzte . Nie war er wirklich weg . Jetzt habe ich die dritte Flasche Evolsin in Gebrauch , zu 99 % ist der Nagelpilz weg ! Endlich wieder normale Fußnägel ! Ich werde diese Flasche noch aufbrauchen und zur Sicherheit noch eine , genau nach Empfehlung , morgens und abends und einmal pro Woche anfeilen . Ich kann das Mittel zu 100 % empfehlen !", "tags": []}, {"r": 5, "t": "Am Schwimmbad einen Fußpilz gefangen, Anfangd war nur eine Stelle Gelb. Ein Monat lang diese Mitttel 3Mal täglich benutzt. Resultat: Nägel abgefahlen, Ich mus dringend zum Arzt. Hätte ich es am Anfang getan, hätte ich mein Nagel gerettet. Also vertraut keinen Mittel sonder geht dierecjt zum Arzt! Update nach dem Arztbesuch: Es war kein Fußpilz sondern bakterielle Infektion. Mein Tipp. Wenn es nach 3 Tagen keine Verbesserung sichtbar ist, besucht lieber den Arzt One person found this helpful", "tags": []}, {"r": 5, "t": "Seit Jahren bekämpfe ich mit verschiedensten Mitteln vergeblich meinen lästigen Fußpilz. Vor einer Woche habe ich mir Evolsin bestellt und bin begeistert, wie schnell sich der Erfolg zeigt. Ich habe die Nägel vor der ersten Anwendung abgeschliffen, trage Evolsin zweimal am Tag (morgens und abends) auf und habe sie nach einer Woche noch mal geschliffen. Die Fußnägel haben sich deutlich verbessert und ich werde es definitiv weiter verwenden, bis ich den Pilz endgültigen losgeworden bin. Ich kann Evolsin zu 100% weiter empfehlen.", "tags": []}, {"r": 5, "t": "Jetzt, nach vierwöchigem Gebrauch, kann ich gern eine Beurteilung abgeben. Da ich bereits all die Mittelchen aus der Werbung durchhabe, die versprochener Weise alle bekannten Erreger beseitigen - nur die auf meinen Fußnägeln nicht - darf ich hier feststellen: Evolsin hat es geschafft bzw. ist noch dabei es zu tun - und das zu einem Preis, bei dem die anderen Anbieter vor Scham nicht rot genug werden müssen. Auch in der einfachen und sauberen Anwendung hebt sich Evolsin positiv von dem teuren Rest ab.", "tags": []}, {"r": 5, "t": "Hab mir am rechten Großzehnagel einen Pilz eingefangen. Von der Seite ausgehend war so knapp ein Viertel befallen. Nicht schön anzuschauen. Milchig, gelb-bräunlich\\... Nichts, womit man sich auf den Sommer freut. Mit diesem Mittel sah das Ganze schon nach wenigen Anwendungen sehr viel weniger ekelig aus. Man muss schon genauer hingucken, um zu sehen, dass mit dem Nagel was nicht stimmt. Die Verfärbung ist nach 2 Wochen regelmäßiger Anwendung eigentlich weg. Ich mach weiter, bis alles rausgewachsen ist. Ich freu mich, dass ich das Mittel ausprobiert hab. Bin sehr zufrieden mit der Wirkung. One person found this helpful", "tags": []}, {"r": 5, "t": "Ich habe schon mehrere Produkte getestet, aber meines war so effizient wie dieses. Im ersten Moment war es nervig, es 2 mal am Tag aufzutragen, aber es hat super geholfen. Erste Ergebnisse waren schnell zu sehen. 1 mal die Woche habe ich den Nagel angeraut. Hat super geholfen. Da ein Fingernagel befallen war, hattebich zuvor Produkte getestet, die mal nur wöchentlich auftragen muss und die überlackiert werden können. Auf lange Sicht haben die leider nichts gebracht", "tags": []}, {"r": 5, "t": "Nach vielen vergeblichen Behandlungsversuchen in den letzten Jahren nach Immunsuppression entwickelte sich mein Nagelpilz immer mehr, dicke, verfärbte, brüchige Nägel blieben trotz Behandlung. Mit Teebaumöl 2x - 3x wöchentlich und Evolsin bekam ich das endlich innerhalb von ca. 6-8 Monaten in den Griff, die Verfärbubngen sind nur noch minimal und die Nägel selber zeigen wieder eine normale Dicke. Der Erfolg zeigte sich schon nach kurzer Zeit, inzwischen ist der hässliche Nagellook herausgewachsen. Ich werde es weiter anwenden, obwohl Evolsin nur langsam einzieht, nehme ich mir die Zeit wegen der Wirksamkeit..", "tags": []}, {"r": 5, "t": "I\\'ve been using this product now for more than 3 months. I started to see that the nail is healing after 2 months. The infected area is growing out, so you have to be patient with the treatment process. (As the cycle of the nail would take 6 months more or less) During the first months i applied the product generously 3 times a day (whenever i was staying home, because it takes time to dry). I am still carrying on with the treatment and i apply it at least once a day.", "tags": []}, {"r": 5, "t": "Ich bin mittlerweile bei der zweiten Flasche Evolsin und trage das Mittel morgens und abends auf. Erste Verbesserungen waren schon nach zwei Wochen zu sehen. Die Nägel wachsen seitdem gesund nach. Bis der Pilz komplett verschwunden ist, dauert es natürlich. Aber ich kann meine Füße wieder zeigen, weil man kaum noch etwas vom Pilz sieht. Vorher hatte ich mehrere Jahre Anti-Pilz-Nagellack verwendet, dass hat überhaupt nicht geholfen.", "tags": []}, {"r": 5, "t": "Ich habe die Therapie wie empfohlen und penibel genau am 12.08.2023 gestartet. Und heute am 28.08 beginnt mein Nagel wieder gesund aus dem Nagelbett zu wachsen 😀. Wenn es so weiter geht würde ich sogar mehr als 5 Sterne geben. Mein Tipp, schleift den Nagel jeden zweiten Tag leicht an und streicht die Tinktur auch etwas auf die angrenzende Haut. Viel Erfolg allen Mitgeplagten.", "tags": []}, {"r": 5, "t": "Also ich bin begeistert, habe schon etliche Mittelchen ausprobiert aber dieses Mittel ist endlich mal wirksam, wende es jetzt seit 1 Woche an und sehe deutliche Verbesserung und da nur 3 Zehe befallen sind komme ich mit 10 ml Ultra lange hin , ist sehr zu empfehlen .", "tags": []}, {"r": 5, "t": "Nach Jahren der Pinselei und Schaberei mit so ziemlich allem was es zu Kaufen gibt, habe ich endlich Erfolg! Wahrscheinlich kommt es auch auf den Typ Nagelpilz an, aber mit diesem Präparat geht es endlich voran. Aber es dauert.... Wochenlang mit Minischritten. Und es gibt auch immer wieder Rückschläge. Ja, Nagelpilz dauert ewig. Ja, es nervt. Ja, sieht sch.... aus. GEBT NICHT AUF!", "tags": []}, {"r": 5, "t": "Alles in Ordnung One person found this helpful", "tags": []}, {"r": 5, "t": "Sehr gut One person found this helpful", "tags": []}, {"r": 5, "t": "Bring nix! Mann muss zu Krankenhaus gehen! Dann kann richtige Lösemittel bekommen! One person found this helpful", "tags": []}, {"r": 5, "t": "I have been using this for almost a month now and it has done a wonderful job is ridding my nail fungus. Even tho my nail is still messed up half way the healthy nail is coming in clean, fast, and beautiful. This stuff is liquid gold! Would be nice tho for the price to have a bigger bottle of this! One person found this helpful", "tags": []}, {"r": 5, "t": "Mein Mann ist äußerst zufrieden mit dem Produkt.", "tags": []}, {"r": 5, "t": "Seit Jahren kämpfe ich gegen Nagelpilz. Ales mögliche ausprobiert. Der Pilz hat nur gelacht über die teuren handelsüblichen und von der Apotheke empfohlenen Mittelchen. Die sind ja auch zum Teil richtig aufwändig. Was soll ich sagen?........Evol
